<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080010">
<title>燭城物語 — 横スクロール</title>
<style>
* {
  margin: 0; padding: 0; box-sizing: border-box;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
html, body {
  overflow: hidden;
  width: 100%;
  height: 100%;
  overscroll-behavior: none;
  touch-action: none;
}
body {
  background: #080010;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100dvh;
  min-height: -webkit-fill-available;
  gap: 8px;
  padding: calc(6px + env(safe-area-inset-top, 0px)) 6px calc(6px + env(safe-area-inset-bottom, 0px));
}
#gameColumn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 0;
  width: 100%;
  max-width: 100vw;
}
#canvasWrap {
  position: relative;
  width: min(100vw - 12px, calc((100dvh - 200px) * 512 / 384));
  max-width: 100%;
  aspect-ratio: 512 / 384;
  flex-shrink: 0;
  touch-action: none;
}
#c {
  display: block;
  width: 100%;
  height: 100%;
  border: 3px solid #500000;
  box-shadow: 0 0 40px #8b000055;
  image-rendering: pixelated;
  touch-action: none;
}
#ctrl {
  color: #cc6600;
  font: bold 12px monospace;
  letter-spacing: 1px;
  text-align: center;
  padding: 0 8px;
  max-width: 100%;
}
#badge { color: #336699; font: 11px monospace; opacity: 0.65; text-align: center; padding: 0 8px; }
@media (max-width: 1024px), (pointer: coarse) {
  #ctrl { font-size: 11px; }
}
/* 142-cyber-blade / 140-asteroid-heroes 系: タッチ用仮想ボタン */
#virtual-controls {
  display: none;
  position: fixed;
  left: 0; right: 0; bottom: 0;
  z-index: 50;
  pointer-events: none;
  flex-direction: column;
  align-items: stretch;
  padding:
    8px
    calc(10px + env(safe-area-inset-right, 0px))
    calc(6px + env(safe-area-inset-bottom, 0px))
    calc(10px + env(safe-area-inset-left, 0px));
  gap: 0;
  background: linear-gradient(0deg, rgba(8, 0, 16, 0.94) 0%, rgba(8, 0, 16, 0.5) 60%, transparent 100%);
}
@media (max-width: 1024px), (pointer: coarse) {
  #virtual-controls { display: flex; }
}
#virtual-controls.disabled {
  opacity: 0.35;
  pointer-events: none;
}
.vc-main {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: flex-end;
  gap: 10px;
  pointer-events: none;
}
.vc-main > * { pointer-events: auto; }
.cv-dpad {
  position: relative;
  width: clamp(148px, 21vw, 176px);
  height: clamp(148px, 21vw, 176px);
  opacity: 0.88;
  pointer-events: auto;
  touch-action: none;
}
.dpad {
  position: absolute;
  inset: 0;
  border-radius: 999px;
}
.dpad-vertical,
.dpad-horizontal {
  position: absolute;
  background: linear-gradient(180deg, #ffffff44, #2a0808bb);
  border: 2px solid rgba(180, 80, 40, 0.55);
  box-shadow: 0 6px 0 #110000bb, 0 10px 20px #0006;
}
.dpad-vertical {
  width: 38%; height: 100%;
  left: 31%; top: 0;
  border-radius: 20px;
}
.dpad-horizontal {
  width: 100%; height: 38%;
  left: 0; top: 31%;
  border-radius: 20px;
}
.dpad-center {
  position: absolute;
  width: 42%; height: 42%;
  left: 29%; top: 29%;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #ff884422, #1a0000cc);
  border: 2px solid rgba(180, 80, 40, 0.5);
  box-shadow: inset 0 2px 8px #0008;
}
.dpad[data-up="1"]    .dpad-vertical   { background: linear-gradient(0deg,   #ffffff22, #cc441188); }
.dpad[data-down="1"]  .dpad-vertical   { background: linear-gradient(180deg, #ffffff22, #cc441188); }
.dpad[data-left="1"]  .dpad-horizontal { background: linear-gradient(90deg,  #cc441188, #ffffff22); }
.dpad[data-right="1"] .dpad-horizontal { background: linear-gradient(270deg, #cc441188, #ffffff22); }
.dpad.pressed { transform: scale(0.97); filter: brightness(1.25); }
.cv-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
  opacity: 0.85;
}
.cv-act-row { display: flex; flex-direction: row; gap: 10px; align-items: flex-end; }
.cv-btn {
  touch-action: none;
  min-width: 56px;
  min-height: 50px;
  padding: 8px 12px;
  border-radius: 12px;
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 0.04em;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  border: 2px solid rgba(255, 200, 120, 0.35);
  color: #fff;
  text-shadow: 0 0 6px rgba(0, 0, 0, 0.85);
  transition: transform 0.08s ease, opacity 0.08s ease;
}
.cv-btn:active, .cv-btn.pressed { transform: translateY(2px); opacity: 0.92; }
.cv-btn-jump {
  background: radial-gradient(circle at 35% 30%, #6a4020, #281008);
  border-color: rgba(212, 164, 40, 0.45);
  box-shadow: 0 4px 0 #180808, 0 0 12px rgba(180, 80, 20, 0.25);
}
.cv-btn-whip {
  background: radial-gradient(circle at 35% 30%, #804020, #301810);
  border-color: rgba(255, 180, 80, 0.4);
  box-shadow: 0 4px 0 #180810, 0 0 12px rgba(255, 140, 40, 0.2);
}
.cv-btn-step {
  background: radial-gradient(circle at 35% 30%, #203860, #0c1828);
  border-color: rgba(100, 160, 255, 0.4);
  box-shadow: 0 4px 0 #080c18, 0 0 12px rgba(80, 130, 255, 0.2);
}
.cv-btn-weapon {
  background: radial-gradient(circle at 35% 30%, #2a3820, #101408);
  border-color: rgba(120, 200, 80, 0.4);
  box-shadow: 0 4px 0 #080c04, 0 0 12px rgba(100, 180, 40, 0.2);
  min-width: 76px;
}
.cv-btn small { display: block; font-size: 8px; font-weight: 600; opacity: 0.88; margin-top: 2px; }
.vc-hint-bar {
  display: none;
  width: 100%;
  text-align: center;
  font-size: 9px;
  line-height: 1.4;
  color: rgba(200, 160, 140, 0.45);
  padding: 4px 4px 0;
  margin-top: 2px;
  border-top: 1px solid rgba(120, 40, 40, 0.25);
  pointer-events: none;
}
@media (max-width: 1024px), (pointer: coarse) {
  .vc-hint-bar { display: block; }
}
</style>
</head>
<body>
<div id="gameColumn">
  <div id="canvasWrap">
    <canvas id="c" width="512" height="384"></canvas>
  </div>
  <div id="ctrl">[ ← → ] 移動 &nbsp;|&nbsp; [ ↑ ] 2段ジャンプ &nbsp;|&nbsp; [ Z ] 攻撃 &nbsp;|&nbsp; [ Shift+← → ] ステップ &nbsp;|&nbsp; [ 1/2/3 ] 武器切替</div>
  <div id="badge">ES2023/24 ✦ Array.toSorted · Array.with · Array.findLast · Object.groupBy · Promise.withResolvers</div>
</div>

<div id="virtual-controls" aria-label="タッチ操作">
  <div class="vc-main">
    <div class="cv-dpad" id="cv-dpad">
      <div class="dpad" id="dpad">
        <div class="dpad-vertical"></div>
        <div class="dpad-horizontal"></div>
        <div class="dpad-center"></div>
      </div>
    </div>
    <div class="cv-actions">
      <div class="cv-act-row">
        <button type="button" class="cv-btn cv-btn-weapon" id="cv-weapon">⚔<small>ムチ</small></button>
        <button type="button" class="cv-btn cv-btn-step" id="cv-step">↩<small>ステップ</small></button>
      </div>
      <div class="cv-act-row">
        <button type="button" class="cv-btn cv-btn-jump" id="cv-jump">↑<small>ジャンプ</small></button>
        <button type="button" class="cv-btn cv-btn-whip" id="cv-whip">Z<small>攻撃</small></button>
      </div>
    </div>
  </div>
  <div class="vc-hint-bar" aria-hidden="true">[◀▶] 移動 · [↑] 2段ジャンプ · [Z] 攻撃 · [↩] ステップ回避</div>
</div>

<script>
'use strict';

// ES2023/2024 の一部 API が無い環境だと起動直後に例外になり Enter が効かないため最低限の互換を入れる
(function () {
  if (typeof Promise.withResolvers !== 'function') {
    Promise.withResolvers = function () {
      var resolve, reject;
      var promise = new Promise(function (res, rej) { resolve = res; reject = rej; });
      return { promise: promise, resolve: resolve, reject: reject };
    };
  }
  if (typeof Object.groupBy !== 'function') {
    Object.groupBy = function (items, callbackFn) {
      var result = Object.create(null);
      var idx = 0;
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var key = callbackFn(item, idx++);
        var sk = String(key);
        if (!result[sk]) result[sk] = [];
        result[sk].push(item);
      }
      return result;
    };
  }
  if (!Array.prototype.with) {
    Array.prototype.with = function (index, value) {
      var copy = this.slice();
      copy[index] = value;
      return copy;
    };
  }
  if (!Array.prototype.findLast) {
    Array.prototype.findLast = function (predicate) {
      for (var i = this.length - 1; i >= 0; i--) {
        if (predicate(this[i], i, this)) return this[i];
      }
      return undefined;
    };
  }
  if (!Array.prototype.toSorted) {
    Array.prototype.toSorted = function (compareFn) {
      return compareFn ? this.slice().sort(compareFn) : this.slice().sort();
    };
  }
  // 【JS新機能】Array.prototype.at (ES2022) — パーティクル色などで使用
  if (!Array.prototype.at) {
    Array.prototype.at = function (n) {
      n = Math.trunc(n) || 0;
      if (n < 0) n += this.length;
      return n < 0 || n >= this.length ? undefined : this[n];
    };
  }
})();

// ═══════════════════════════════════════════════════════
//  定数
// ═══════════════════════════════════════════════════════
const W = 512, H = 384;
const G = 0.45;        // 重力加速度
const PSPD = 3.5;      // プレイヤー移動速度
const JV = -13;        // ジャンプ初速
const WDUR = 22;       // ムチ持続フレーム数
const WRANGE = 72;     // ムチ射程(px)
const INVDUR = 88;     // 無敵時間(フレーム)

/** @typedef {'whip'|'dagger'|'throw_axe'|'bomb'|'sword'|'axe'} WeaponId */
/** ろうそくドロップ武器（1/10）。短剣はユーザー表記「探検」を想定して短剣に相当させる */
const DROP_WEAPON_KINDS = Object.freeze(['dagger', 'throw_axe', 'bomb', 'sword', 'axe']);
const WEAPON_LABEL_JA = Object.freeze({
  whip: 'ムチ',
  dagger: '短剣',
  throw_axe: '投げ斧',
  bomb: '爆弾',
  sword: 'ソード',
  axe: '斧',
});
/** 近接武器の攻撃持続フレーム */
const WEAPON_MELEE_DUR = Object.freeze({
  whip: WDUR,
  dagger: 14,
  sword: 22,
  axe: 30,
});

/** ろうそくから武器が出る確率（厳密に 1/10） */
const CANDLE_WEAPON_DROP_RATE = 0.1;
const KNOWN_WEAPON_IDS = new Set(['whip', ...DROP_WEAPON_KINDS]);

function sanitizeWeaponId(id) {
  const k = id == null ? '' : String(id);
  return KNOWN_WEAPON_IDS.has(k) ? k : 'whip';
}

/** 全ボスの stats.w / stats.h に掛ける倍率 */
const BOSS_SIZE_MULT = 3;
/** 1面・大コウモリ：PNG 収め後のサイズに掛ける倍率（「現在の」見た目の4倍） */
const GIANT_BAT_REL_MULT = 4;
const isMobileUa = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
/** ?perf=1 で FPS（平滑化）を HUD に表示 — iOS などの体感診断用 */
const __gameShowHudPerf = typeof URLSearchParams !== 'undefined' &&
  new URLSearchParams(location.search).get('perf') === '1';

// ═══════════════════════════════════════════════════════
//  BGM — 場面と 1:1。同時再生禁止（必ず全停止→1 曲だけ play）
//  ファイルは index.html と同じフォルダ
// ═══════════════════════════════════════════════════════
/** @typedef {'opening'|'battle'|'boss'|'boss2'|'gameover'|'ending'} BgmTrackId */

const BgmTrack = Object.freeze({
  OPENING: 'opening',
  BATTLE: 'battle',
  BOSS: 'boss',
  BOSS2: 'boss2',
  GAMEOVER: 'gameover',
  ENDING: 'ending',
});

const BGM_FILES = Object.freeze({
  [BgmTrack.OPENING]: 'Cadit_Fides.mp3',
  [BgmTrack.BATTLE]: 'battle.mp3',
  [BgmTrack.BOSS]: 'boss.mp3',
  [BgmTrack.BOSS2]: 'boss2.mp3',
  [BgmTrack.GAMEOVER]: 'gameover.mp3',
  [BgmTrack.ENDING]: 'endding.mp3',
});

/** ループする曲（クリア／ゲームオーバーは 1 周で切り替わる想定でループオフ） */
const BGM_SHOULD_LOOP = Object.freeze({
  [BgmTrack.OPENING]: true,
  [BgmTrack.BATTLE]: true,
  [BgmTrack.BOSS]: true,
  [BgmTrack.BOSS2]: true,
  [BgmTrack.GAMEOVER]: false,
  [BgmTrack.ENDING]: false,
});

const BGM_DEFAULT_VOL = 0.5;

/** @type {Record<string, HTMLAudioElement>} */
const bgmPlayers = {};
function initBgmPlayers() {
  Object.keys(BGM_FILES).forEach(key => {
    const a = new Audio(BGM_FILES[key]);
    a.preload = 'auto';
    a.volume = BGM_DEFAULT_VOL;
    bgmPlayers[key] = a;
  });
}
initBgmPlayers();

/** 現在「意図して鳴らしている」トラック ID（無音時は ''） */
let bgmCurrentId = '';
/** `syncBgmToGame` が最後に適用した希望トラック（重複 apply 抑止） */
let bgmLastAppliedWant = '';
/** `play()` の競合検知（古い Promise の catch で状態を壊さない） */
let bgmPlayGeneration = 0;

function pauseEveryBgmPlayer() {
  Object.keys(bgmPlayers).forEach(key => {
    const a = bgmPlayers[key];
    if (!a) return;
    try {
      a.pause();
      a.currentTime = 0;
    } catch (_) {}
  });
}

/**
 * 指定トラック 1 つのみ再生。他は必ず停止済み。
 * @param {BgmTrackId} trackId
 */
function setBgmTrack(trackId) {
  if (!trackId || !bgmPlayers[trackId]) return;
  const next = bgmPlayers[trackId];
  if (bgmCurrentId === trackId && !next.paused) return;

  pauseEveryBgmPlayer();

  const gen = ++bgmPlayGeneration;
  bgmCurrentId = trackId;
  next.loop = !!BGM_SHOULD_LOOP[trackId];
  try { next.currentTime = 0; } catch (_) {}

  const p = next.play();
  if (p && typeof p.catch === 'function') {
    p.catch(() => {
      if (gen !== bgmPlayGeneration) return;
      bgmCurrentId = '';
      bgmLastAppliedWant = '';
    });
  }
}

/**
 * ゲーム状態から希望 BGM を一意に決定（ここ以外ではトラックを選ばない）
 * @returns {BgmTrackId|''}
 */
function computeDesiredBgmTrack() {
  if (gs === 'title') return BgmTrack.OPENING;
  if (gs === 'gameover') return BgmTrack.GAMEOVER;
  if (gs === 'clear') return BgmTrack.ENDING;
  if (gs !== 'playing') return '';

  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (!e.alive || e.t !== 'boss') continue;
    if (e.kind === 'night_lord') return BgmTrack.BOSS2;
    return BgmTrack.BOSS;
  }
  return BgmTrack.BATTLE;
}

function syncBgmToGame() {
  const want = computeDesiredBgmTrack();
  if (!want) return;
  if (want === bgmLastAppliedWant) return;
  bgmLastAppliedWant = want;
  setBgmTrack(want);
}

/** タイトルでユーザー操作後、希望曲の再評価（__last クリアで必ず 1 回は通す） */
function tryTitleBgmAfterGesture() {
  if (gs !== 'title') return;
  bgmLastAppliedWant = '';
  syncBgmToGame();
}
document.addEventListener('pointerdown', tryTitleBgmAfterGesture, { capture: true, passive: true });
document.addEventListener('keydown', tryTitleBgmAfterGesture, { capture: true, passive: true });

// ═══════════════════════════════════════════════════════
//  iOS ダブルタップ防止
//  touchstart で 300ms 以内の 2 回目タップを明示的に preventDefault（CSS は touch-action: none 補助）
// ═══════════════════════════════════════════════════════
(function preventIosDoubleTap() {
  let lastTouchEnd = 0;
  document.addEventListener('touchstart', e => {
    const now = Date.now();
    if (now - lastTouchEnd < 300) {
      e.preventDefault(); // ダブルタップズームをブロック
    }
  }, { passive: false, capture: true });
  document.addEventListener('touchend', e => {
    lastTouchEnd = Date.now();
  }, { passive: true, capture: true });
  // dblclick も念のためブロック（iOS Chrome 対策）
  document.addEventListener('dblclick', e => { e.preventDefault(); }, { passive: false });
  document.addEventListener('contextmenu', e => { e.preventDefault(); }, { passive: false });
})();

// ═══════════════════════════════════════════════════════
//  SE (効果音) — Web Audio API でムチ音を合成
//  外部ファイル不要・iOS でも最初のジェスチャー後に再生可能
// ═══════════════════════════════════════════════════════
let _sfxCtx = null;
function getSfxCtx() {
  if (!_sfxCtx) {
    _sfxCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_sfxCtx.state === 'suspended') {
    _sfxCtx.resume().catch(() => {});
  }
  return _sfxCtx;
}
// iOS: 最初のユーザー操作で AudioContext をアンロック（キーボードのみプレイでも鳴るよう keydown も）
function unlockSfxOnce() {
  try {
    const c = getSfxCtx();
    if (c && c.state === 'suspended') void c.resume();
  } catch (_) {}
}
document.addEventListener('pointerdown', unlockSfxOnce, { once: true, passive: true });
document.addEventListener('keydown', unlockSfxOnce, { once: true, passive: true });

function playDpadClick() {
  try {
    const ctx = getSfxCtx();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = 620;
    gain.gain.setValueAtTime(0.03, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.022);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.022);
  } catch (_) {}
}

/**
 * ムチの「ビシッ！」音を Web Audio API で合成して再生
 * ホワイトノイズ → バンドパスフィルター → ゲインエンベロープ
 */
function playWhipSfx() {
  try {
    const ctx = getSfxCtx();
    const now = ctx.currentTime;

    // ホワイトノイズバッファ (0.22秒分)
    const bufLen = Math.ceil(ctx.sampleRate * 0.22);
    const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

    const src = ctx.createBufferSource();
    src.buffer = buf;

    // バンドパスフィルター: 周波数を急上昇→減衰（ビシッ感）
    const bpf = ctx.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.setValueAtTime(1800, now);
    bpf.frequency.exponentialRampToValueAtTime(9000, now + 0.03);
    bpf.frequency.exponentialRampToValueAtTime(1000, now + 0.14);
    bpf.Q.value = 0.7;

    // ゲインエンベロープ: 鋭いアタック→素早い減衰
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.001, now);
    gain.gain.linearRampToValueAtTime(0.6, now + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);

    src.connect(bpf);
    bpf.connect(gain);
    gain.connect(ctx.destination);
    src.start(now);
    src.stop(now + 0.23);
  } catch (_) {}
}

/**
 * コイン取得 SE — suspended 中は無音になるため resume 後にスケジュール。
 * ハイパスノイズ（金属きらめき）＋重ね sine ベル＋短い square で迫力を出す。
 */
function playCoinSfx() {
  const ctx = getSfxCtx();
  const schedule = () => {
    try {
      if (ctx.state !== 'running') return;
      const t0 = ctx.currentTime;
      const master = ctx.createGain();
      master.gain.setValueAtTime(0.0001, t0);
      master.gain.linearRampToValueAtTime(0.62, t0 + 0.018);
      master.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.42);
      master.connect(ctx.destination);

      const mkBell = (freq, delay, peak) => {
        const o = ctx.createOscillator();
        o.type = 'sine';
        const t = t0 + delay;
        o.frequency.setValueAtTime(freq * 1.04, t);
        o.frequency.exponentialRampToValueAtTime(freq, t + 0.028);
        const g = ctx.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.linearRampToValueAtTime(peak, t + 0.005);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
        o.connect(g);
        g.connect(master);
        o.start(t);
        o.stop(t + 0.34);
      };
      mkBell(2093, 0, 0.42);
      mkBell(2794, 0.032, 0.28);
      mkBell(3520, 0.058, 0.2);

      const nLen = Math.ceil(ctx.sampleRate * 0.09);
      const nb = ctx.createBuffer(1, nLen, ctx.sampleRate);
      const nd = nb.getChannelData(0);
      for (let i = 0; i < nLen; i++) nd[i] = (Math.random() * 2 - 1) * (1 - i / nLen);
      const ns = ctx.createBufferSource();
      ns.buffer = nb;
      const nhp = ctx.createBiquadFilter();
      nhp.type = 'highpass';
      nhp.frequency.value = 2200;
      nhp.Q.value = 0.7;
      const ng = ctx.createGain();
      ng.gain.setValueAtTime(0.0001, t0);
      ng.gain.linearRampToValueAtTime(0.32, t0 + 0.006);
      ng.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.075);
      ns.connect(nhp);
      nhp.connect(ng);
      ng.connect(master);
      ns.start(t0);
      ns.stop(t0 + 0.095);

      const sq = ctx.createOscillator();
      sq.type = 'square';
      sq.frequency.setValueAtTime(520, t0);
      sq.frequency.exponentialRampToValueAtTime(140, t0 + 0.055);
      const sqf = ctx.createBiquadFilter();
      sqf.type = 'lowpass';
      sqf.frequency.value = 3200;
      const sg = ctx.createGain();
      sg.gain.setValueAtTime(0.0001, t0);
      sg.gain.linearRampToValueAtTime(0.085, t0 + 0.002);
      sg.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.06);
      sq.connect(sqf);
      sqf.connect(sg);
      sg.connect(master);
      sq.start(t0);
      sq.stop(t0 + 0.07);
    } catch (_) {}
  };
  if (ctx.state === 'running') schedule();
  else void ctx.resume().then(schedule);
}

let __bgCacheTheme = null;
/** @type {HTMLCanvasElement | null} */
let __bgCacheCv = null;
/** @type {CanvasRenderingContext2D | null} */
let __bgCacheCtx = null;
function invalidateBgPatternCache() {
  __bgCacheTheme = null;
}
function rebuildBgPatternCache() {
  const th = getCurrentStageTheme();
  if (!__bgCacheCv) {
    __bgCacheCv = document.createElement('canvas');
    __bgCacheCv.width = W;
    __bgCacheCv.height = H;
    __bgCacheCtx = __bgCacheCv.getContext('2d', { alpha: false });
    if (__bgCacheCtx) __bgCacheCtx.imageSmoothingEnabled = false;
  }
  const bctx = __bgCacheCtx;
  if (!bctx) return;
  const P = getBgPalette();
  bctx.fillStyle = P.bg;
  bctx.fillRect(0, 0, W, H);
  const bw = 64, bh = 24;
  for (let r = 0; r * bh < 320; r++) {
    const off = r % 2 ? bw / 2 : 0;
    for (let c = -1; c * bw < W + bw; c++) {
      const rx = c * bw - off;
      bctx.fillStyle = (r + c) % 3 === 0 ? P.brickC : (r + c) % 3 === 1 ? P.brickB : P.brickA;
      bctx.fillRect(rx + 1, r * bh + 1, bw - 2, bh - 2);
    }
  }
  (P.win || []).forEach(([wx, wy]) => {
    bctx.fillStyle = P.winFrame;
    bctx.fillRect(wx, wy, 30, 38);
    bctx.fillStyle = P.winInner;
    bctx.fillRect(wx + 2, wy + 2, 12, 34);
    bctx.fillRect(wx + 16, wy + 2, 12, 34);
    bctx.fillStyle = P.winGlow;
    bctx.fillRect(wx + 6, wy + 6, 4, 4);
    bctx.fillRect(wx + 20, wy + 6, 4, 4);
  });
  __bgCacheTheme = th;
}
function drawCachedBgPattern() {
  const th = getCurrentStageTheme();
  if (__bgCacheTheme !== th || !__bgCacheCv) rebuildBgPatternCache();
  if (__bgCacheCv) cx.drawImage(__bgCacheCv, 0, 0);
}

//  キー入力待ちのPromiseで管理する
// ───────────────────────────────────────────────────────
function waitKey(code) {
  const { promise, resolve } = Promise.withResolvers();
  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    removeEventListener('keydown', onKey);
    removeEventListener('touchend', onTouch, touchOpts);
    removeEventListener('pointerdown', onPointer, touchOpts);
    resolve();
  };
  const onKey = e => {
    if (e.code === code) finish();
  };
  const touchOpts = { capture: true, passive: false };
  const onTouch = e => {
    if (e.target.closest && e.target.closest('#virtual-controls')) return;
    e.preventDefault();
    finish();
  };
  /** タップ／クリック即応（touchend より早い端末・マウス操作向け） */
  const onPointer = e => {
    if (e.target.closest && e.target.closest('#virtual-controls')) return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    e.preventDefault();
    finish();
  };
  addEventListener('keydown', onKey);
  addEventListener('touchend', onTouch, touchOpts);
  addEventListener('pointerdown', onPointer, touchOpts);
  return promise;
}

function mkBossFromDef(def) {
  const st = def.stats || { hp: 8, w: 32, h: 28 };
  const sw = st.w != null ? st.w : 32;
  const sh = st.h != null ? st.h : 28;
  let w = Math.round(sw * BOSS_SIZE_MULT);
  let h = Math.round(sh * BOSS_SIZE_MULT);
  const hp = st.hp;
  const k = def.archetype || 'giant_bat';
  const name = def.displayName || 'ボス';
  // 1面・大コウモリ：PNG 全体（透明画素込み）を stats×3 内に収めたうえで GIANT_BAT_REL_MULT 倍→画面内に再収め
  if (k === 'giant_bat' && stageIndex === 0) {
    const im = IMG_GIANT_BAT;
    if (im.complete && im.naturalWidth > 0) {
      const iw = im.naturalWidth, ih = im.naturalHeight;
      const tw = Math.round((st.w != null ? st.w : 36) * BOSS_SIZE_MULT);
      const th = Math.round((st.h != null ? st.h : 28) * BOSS_SIZE_MULT);
      const scale = Math.min(tw / iw, th / ih);
      w = Math.round(iw * scale);
      h = Math.round(ih * scale);
    }
    w = Math.round(w * GIANT_BAT_REL_MULT);
    h = Math.round(h * GIANT_BAT_REL_MULT);
    const oy = def.y != null ? def.y : 120;
    const maxWBox = W - 16;
    const maxHBox = Math.max(36, H - oy - 108);
    const fit = Math.min(1, maxWBox / w, maxHBox / h);
    w = Math.max(12, ~~(w * fit));
    h = Math.max(12, ~~(h * fit));
  }
  if (isFlyBossArchetype(k)) {
    let sx = def.x, sy = def.y;
    if (k === 'giant_bat') {
      const bx = def.x != null ? def.x : ~~(W / 2 - w / 2);
      const by = def.y != null ? def.y : 100;
      sx = Math.max(8, Math.min(W - w - 8, bx));
      sy = Math.max(8, Math.min(H - h - 110, by));
    }
    return {
      t: 'boss', kind: k, mode: 'fly', x: sx, y: sy, w, h,
      ox: sx, oy: sy, ti: Math.random() * Math.PI * 2,
      hp, alive: true, ht: 0, displayName: name,
    };
  }
  const wx = def.x != null ? def.x : 200;
  const wy = def.y != null ? def.y : 100;
  const wxc = Math.max(4, Math.min(W - w - 4, wx));
  /** @type {object} */
  const body = {
    t: 'boss', kind: k, mode: 'walk', x: wxc, y: wy, w, h,
    vx: 0, vy: 0, hp, alive: true, ht: 0, ground: false, displayName: name,
  };
  if (k === 'golem') {
    body.golemPhaseT = 0;
    body.detached = false;
    body.partHead = null;
    body.partL = null;
    body.partR = null;
  }
  return body;
}

const overlaps = (a, b) =>
  a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;

/** 敵の当たり矩形（ゴーレムは分離後に胴＋頭＋両手） */
function enemyHitRects(e) {
  if (e.t !== 'boss' || e.kind !== 'golem') {
    return [{ x: e.x, y: e.y, w: e.w, h: e.h }];
  }
  if (!e.detached || !e.partHead) {
    return [{ x: e.x, y: e.y, w: e.w, h: e.h }];
  }
  const tw = e.w * 0.52;
  const tx = e.x + (e.w - tw) / 2;
  const ty = e.y + e.h * 0.4;
  const th = e.h * 0.58;
  const ph = e.partHead;
  const pL = e.partL;
  const pR = e.partR;
  return [
    { x: tx, y: ty, w: tw, h: th },
    { x: ph.x, y: ph.y, w: ph.w, h: ph.h },
    { x: pL.x, y: pL.y, w: pL.w, h: pL.h },
    { x: pR.x, y: pR.y, w: pR.w, h: pR.h },
  ];
}

function playerOverlapsEnemy(pl0, e) {
  if (!e.alive) return false;
  const rects = enemyHitRects(e);
  for (let i = 0; i < rects.length; i++) {
    if (overlaps(pl0, rects[i])) return true;
  }
  return false;
}

function projectileOverlapsEnemy(proj, e) {
  if (!e.alive) return false;
  const rects = enemyHitRects(e);
  for (let i = 0; i < rects.length; i++) {
    if (overlaps(proj, rects[i])) return true;
  }
  return false;
}

// ───────────────────────────────────────────────────────
//  【JS新機能②】Array.prototype.findLast (ES2023)
//  下から検索し、エンティティが乗るべき「最後に見つかる」
//  プラットフォームを取得する（重なり時に最前面を優先）
// ───────────────────────────────────────────────────────
function landOn(e) {
  const p = PLATS.findLast(p =>
    e.x + e.w > p.x       && e.x < p.x + p.w &&
    e.y + e.h > p.y       &&
    e.y + e.h < p.y + p.h + Math.abs(e.vy) + 5 &&
    e.vy >= 0
  );
  if (p) { e.y = p.y - e.h; e.vy = 0; e.ground = true; }
  else    { e.ground = false; }
}

function burst(x, y, n = 8) {
  const maxP = isMobileUa ? 72 : 180;
  const capN = isMobileUa ? Math.min(n, 5) : n;
  const count = Math.min(capN, Math.max(0, maxP - ptcls.length));
  const parts = COL.particles;
  for (let i = 0; i < count; i++) {
    const a = (Math.PI * 2 * i / Math.max(1, count)) + (Math.random() - .5) * .9;
    const s = 1.5 + Math.random() * 2.2;
    ptcls.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 1.8,
      life: 26 + ~~(Math.random() * 14),
      col: parts.at(i % parts.length),
    });
  }
}

function enemyKillScore(e) {
  if (e.t === 'boss') return 600;
  if (e.t === 'b') return 200;
  if (e.t === 'h') return 180;
  if (e.t === 's') return 120;
  if (e.t === 'd') return 170;
  if (e.t === 'T') return 220;
  if (e.t === 'n') return 150;
  if (e.t === 'H') return 210;
  if (e.t === 'L') return 240;
  if (e.t === 'K') return 130;
  if (e.t === 'B') return 190;
  return 100;
}

function damageEnemyByIndex(i, dmg) {
  const e = enemies[i];
  if (!e || !e.alive || e.ht > 0) return;
  const nhp = e.hp - dmg;
  const alive = nhp > 0;
  enemies = enemies.with(i, { ...e, hp: Math.max(0, nhp), alive, ht: 24 });
  if (!alive) {
    score += enemyKillScore(e);
    burst(e.x + e.w / 2, e.y + e.h / 2);
  }
}

/** ろうそく破壊時：コイン（1 - CANDLE_WEAPON_DROP_RATE）または武器（CANDLE_WEAPON_DROP_RATE=1/10） */
function spawnCandleLoot(cx0, cy0) {
  const px = cx0 + (Math.random() - 0.5) * 10;
  const py = cy0 - 14;
  if (Math.random() < CANDLE_WEAPON_DROP_RATE) {
    const kind = DROP_WEAPON_KINDS[~~(Math.random() * DROP_WEAPON_KINDS.length)];
    pickups.push({ t: 'weapon', kind: sanitizeWeaponId(kind), x: px, y: py, vx: (Math.random() - 0.5) * 1.2, vy: -2.8, bob: Math.random() * Math.PI * 2 });
  } else {
    const val = 18 + ~~(Math.random() * 38);
    pickups.push({ t: 'coin', val, x: px, y: py, vx: (Math.random() - 0.5) * 1.2, vy: -2.8, bob: Math.random() * Math.PI * 2 });
  }
}

function breakCandleAt(i, c) {
  if (!c || !c.a) return;
  candles = candles.with(i, { ...c, a: false });
  burst(c.x, c.y - 8, 5);
  spawnCandleLoot(c.x, c.y);
}

/**
 * 近接攻撃の当たり箱（このフレームのみ）
 * @returns {{x:number,y:number,w:number,h:number}|null}
 */
function getPlayerMeleeHitbox() {
  if (!pl.atk) return null;
  const wid = sanitizeWeaponId(pl.weapon);
  const dur = WEAPON_MELEE_DUR[wid];
  if (!dur) return null;
  const prog = 1 - pl.atkT / dur;
  const dir = pl.facing;
  const fy = pl.y + 4;
  if (wid === 'whip') {
    // 描画と同じ式で視覚的な先端位置を計算し、当たり判定を一致させる
    const ext  = Math.min(prog * 2, 1);
    const ret  = pl.atkT < dur * 0.5 ? pl.atkT / (dur * 0.5) : 1;
    const wlen = WRANGE * ext * ret;
    if (wlen < 4) return null;
    const wx = dir > 0 ? pl.x + pl.w : pl.x - wlen;
    return { x: wx, y: fy, w: wlen, h: 20 };
  }
  if (wid === 'dagger') {
    if (prog < 0.12 || prog > 0.75) return null;
    const reach = 42;
    const wx = dir > 0 ? pl.x + pl.w - 6 : pl.x - reach + 6;
    return { x: wx, y: fy + 2, w: reach, h: 16 };
  }
  if (wid === 'sword') {
    if (prog < 0.18 || prog > 0.88) return null;
    const reach = 62;
    const wx = dir > 0 ? pl.x + pl.w - 10 : pl.x - reach + 10;
    return { x: wx, y: fy - 6, w: reach, h: 28 };
  }
  if (wid === 'axe') {
    if (prog < 0.36 || prog > 0.98) return null;
    const reach = 54;
    const wx = dir > 0 ? pl.x + pl.w - 12 : pl.x - reach + 12;
    return { x: wx, y: fy - 14, w: reach, h: 36 };
  }
  return null;
}

function applyMeleeHitboxToWorld(wb) {
  enemies.forEach((e, i) => {
    if (!e.alive || e.ht > 0) return;
    const rects = enemyHitRects(e);
    let hit = false;
    for (let ri = 0; ri < rects.length; ri++) {
      if (overlaps(wb, rects[ri])) { hit = true; break; }
    }
    if (!hit) return;
    const nhp = e.hp - 1;
    enemies = enemies.with(i, { ...e, hp: nhp, alive: nhp > 0, ht: 24 });
    if (nhp <= 0) {
      score += enemyKillScore(e);
      burst(e.x + e.w / 2, e.y + e.h / 2);
    }
  });
  candles.forEach((c, i) => {
    if (!c.a) return;
    if (overlaps(wb, { x: c.x - 5, y: c.y - 20, w: 10, h: 24 })) breakCandleAt(i, c);
  });
}

function applyExplosion(ex, ey, radius, dmg) {
  burst(ex, ey, isMobileUa ? 12 : 22);
  const r2 = radius * radius;
  enemies.forEach((e, i) => {
    if (!e.alive) return;
    let inBlast = false;
    const rects = enemyHitRects(e);
    for (let ri = 0; ri < rects.length; ri++) {
      const r = rects[ri];
      const cx = r.x + r.w / 2;
      const cy = r.y + r.h / 2;
      const dx = cx - ex;
      const dy = cy - ey;
      if (dx * dx + dy * dy < r2) { inBlast = true; break; }
    }
    if (inBlast) damageEnemyByIndex(i, dmg);
  });
  candles.forEach((c, i) => {
    if (!c.a) return;
    const dx = c.x - ex;
    const dy = c.y - 12 - ey;
    if (dx * dx + dy * dy < r2) breakCandleAt(i, c);
  });
}

function startPlWeaponAction() {
  const wid = sanitizeWeaponId(pl.weapon);
  if (wid === 'throw_axe') {
    projs.push({
      t: 'axe',
      x: pl.facing > 0 ? pl.x + pl.w - 2 : pl.x - 14,
      y: pl.y + 8,
      w: 16,
      h: 12,
      vx: pl.facing * 9.2,
      vy: -2.2,
      life: 78,
    });
    pl.atkCd = 20;
    playWhipSfx();
    return;
  }
  if (wid === 'bomb') {
    projs.push({
      t: 'bomb',
      x: pl.x + pl.w / 2 - 5,
      y: pl.y + 4,
      w: 10,
      h: 10,
      vx: pl.facing * 3.6,
      vy: -6.2,
      fuse: 100,
    });
    pl.atkCd = 34;
    playWhipSfx();
    return;
  }
  pl.atk = true;
  pl.atkT = WEAPON_MELEE_DUR[wid] || WDUR;
  playWhipSfx();
}

function tickPickups() {
  const out = [];
  for (let pi = 0; pi < pickups.length; pi++) {
    const p = pickups[pi];
    p.vy += G * 0.48;
    p.x += p.vx;
    p.y += p.vy;
    const landE = { x: p.x - 7, y: p.y - 14, w: 14, h: 14, vx: 0, vy: p.vy, ground: false };
    landOn(landE);
    p.x = landE.x + 7;
    p.y = landE.y + 14;
    p.vy = landE.vy;
    if (landE.ground && p.vy >= -0.1) p.vy = 0;
    p.bob = (p.bob || 0) + 0.08;

    const hb = { x: p.x - 8, y: p.y - 18, w: 16, h: 18 };
    if (overlaps(pl, hb)) {
      if (p.t === 'coin') {
        score += p.val;
        playCoinSfx();
      } else if (p.t === 'weapon') {
        pl.weapon = sanitizeWeaponId(p.kind);
        pl.atk = false;
        pl.atkT = 0;
        pl.atkCd = Math.max(pl.atkCd || 0, 6);
      }
      continue;
    }
    out.push(p);
  }
  pickups = out;
}

function tickProjs() {
  for (let i = projs.length - 1; i >= 0; i--) {
    const p = projs[i];
    if (p.t === 'axe') {
      p.vy += G * 0.42;
      p.x += p.vx;
      p.y += p.vy;
      const landE = { x: p.x, y: p.y, w: p.w, h: p.h, vx: 0, vy: p.vy, ground: false };
      landOn(landE);
      p.x = landE.x;
      p.y = landE.y;
      p.vy = landE.vy;
      p.life--;
      let axeRemoved = false;
      for (let j = 0; j < enemies.length; j++) {
        const e = enemies[j];
        if (!e.alive || e.ht > 0) continue;
        if (!projectileOverlapsEnemy(p, e)) continue;
        const nhp = e.hp - 1;
        enemies = enemies.with(j, { ...e, hp: nhp, alive: nhp > 0, ht: 24 });
        if (nhp <= 0) {
          score += enemyKillScore(e);
          burst(e.x + e.w / 2, e.y + e.h / 2);
        }
        burst(p.x + p.w / 2, p.y + p.h / 2, 8);
        projs.splice(i, 1);
        axeRemoved = true;
        break;
      }
      if (!axeRemoved) {
        for (let ci = 0; ci < candles.length; ci++) {
          const c = candles[ci];
          if (!c.a) continue;
          if (!overlaps(p, { x: c.x - 5, y: c.y - 20, w: 10, h: 24 })) continue;
          breakCandleAt(ci, c);
          burst(p.x + p.w / 2, p.y + p.h / 2, 6);
          projs.splice(i, 1);
          axeRemoved = true;
          break;
        }
      }
      if (!axeRemoved && p.life <= 0) projs.splice(i, 1);
    } else if (p.t === 'bomb') {
      p.vy += G * 0.52;
      p.x += p.vx;
      p.y += p.vy;
      const landE = { x: p.x, y: p.y, w: p.w, h: p.h, vx: 0, vy: p.vy, ground: false };
      landOn(landE);
      p.x = landE.x;
      p.y = landE.y;
      p.vy = landE.vy;
      p.fuse--;
      let touchEnemy = false;
      for (let j = 0; j < enemies.length; j++) {
        const e = enemies[j];
        if (e.alive && projectileOverlapsEnemy(p, e)) { touchEnemy = true; break; }
      }
      if (p.fuse <= 0 || touchEnemy) {
        applyExplosion(p.x + p.w / 2, p.y + p.h / 2, 56, 2);
        projs.splice(i, 1);
      }
    }
  }
}

let __vcLastPlaying = null;
function syncVirtualControlsFromGs() {
  const playing = gs === 'playing';
  if (__vcLastPlaying === playing) return;
  __vcLastPlaying = playing;
  const vc = document.getElementById('virtual-controls');
  if (vc) vc.classList.toggle('disabled', !playing);
}

/** 140-asteroid-heroes 系: Pointer Events + capture（タッチ／マウス共通） */
function initVirtualControls() {
  const vc = document.getElementById('virtual-controls');
  if (!vc) return;
  const mapDir = { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' };
  function bindPointer(el, codes) {
    const down = e => {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      e.preventDefault();
      try { el.setPointerCapture(e.pointerId); } catch (_) {}
      codes.forEach(c => { K[c] = true; });
      el.classList.add('pressed');
    };
    const up = e => {
      e.preventDefault();
      codes.forEach(c => { K[c] = false; });
      el.classList.remove('pressed');
      try { el.releasePointerCapture(e.pointerId); } catch (_) {}
    };
    const lost = () => {
      codes.forEach(c => { K[c] = false; });
      el.classList.remove('pressed');
    };
    el.addEventListener('pointerdown', down, { passive: false });
    el.addEventListener('pointerup', up, { passive: false });
    el.addEventListener('pointercancel', up, { passive: false });
    el.addEventListener('lostpointercapture', lost);
  }
  // D-pad: 1本指でベクトル判定（斜め入力対応）
  const dpadWrap = document.getElementById('cv-dpad');
  const dpadEl   = document.getElementById('dpad');
  let _dpadPid = null;

  function _setDpad(up, down, left, right) {
    K.ArrowUp    = up;
    K.ArrowDown  = down;
    K.ArrowLeft  = left;
    K.ArrowRight = right;
    if (dpadEl) {
      dpadEl.dataset.up    = up    ? '1' : '0';
      dpadEl.dataset.down  = down  ? '1' : '0';
      dpadEl.dataset.left  = left  ? '1' : '0';
      dpadEl.dataset.right = right ? '1' : '0';
      dpadEl.classList.toggle('pressed', up || down || left || right);
    }
  }

  function _calcDpad(e) {
    const r    = dpadWrap.getBoundingClientRect();
    const dx   = e.clientX - (r.left + r.width  / 2);
    const dy   = e.clientY - (r.top  + r.height / 2);
    const s    = r.width;
    const dead = s * 0.13;
    const thr  = s * 0.16;
    if (Math.abs(dx) < dead && Math.abs(dy) < dead) {
      _setDpad(false, false, false, false);
      return;
    }
    _setDpad(dy < -thr, dy > thr, dx < -thr, dx > thr);
  }

  if (dpadWrap) {
    dpadWrap.addEventListener('pointerdown', e => {
      e.preventDefault();
      _dpadPid = e.pointerId;
      try { dpadWrap.setPointerCapture(e.pointerId); } catch (_) {}
      _calcDpad(e);
      playDpadClick();
    }, { passive: false });
    dpadWrap.addEventListener('pointermove', e => {
      if (e.pointerId !== _dpadPid) return;
      e.preventDefault();
      _calcDpad(e);
    }, { passive: false });
    const _relDpad = e => {
      if (e.pointerId !== _dpadPid) return;
      _dpadPid = null;
      _setDpad(false, false, false, false);
    };
    dpadWrap.addEventListener('pointerup',          _relDpad);
    dpadWrap.addEventListener('pointercancel',      _relDpad);
    dpadWrap.addEventListener('lostpointercapture', () => _setDpad(false, false, false, false));
  }
  const jump = document.getElementById('cv-jump');
  const whip = document.getElementById('cv-whip');
  if (jump) bindPointer(jump, ['ArrowUp', 'KeyX']);
  if (whip) bindPointer(whip, ['KeyZ', 'Space']);
  const step = document.getElementById('cv-step');
  if (step) bindPointer(step, ['KeyStep']);

  // 武器ローテーションボタン（キーステートを使わず直接切り替え）
  const weaponBtn = document.getElementById('cv-weapon');
  if (weaponBtn) {
    weaponBtn.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (gs !== 'playing' || !pl) return;
      const order = ['whip', 'dagger', 'throw_axe'];
      const cur = sanitizeWeaponId(pl.weapon);
      pl.weapon = order[(order.indexOf(cur) + 1) % order.length];
      updateWeaponBtn();
    }, { passive: false });
  }
}

function updateWeaponBtn() {
  const btn = document.getElementById('cv-weapon');
  if (!btn || !pl) return;
  const label = WEAPON_LABEL_JA[sanitizeWeaponId(pl.weapon)] || 'ムチ';
  btn.querySelector('small').textContent = label;
}

let __lastWeaponForBtn = '';
function syncWeaponBtn() {
  if (!pl) return;
  const cur = sanitizeWeaponId(pl.weapon);
  if (cur !== __lastWeaponForBtn) { __lastWeaponForBtn = cur; updateWeaponBtn(); }
}

// ═══════════════════════════════════════════════════════
//  更新ロジック
// ═══════════════════════════════════════════════════════
function update() {
  syncVirtualControlsFromGs();
  if (gs !== 'playing') return;

  // ─── プレイヤー操作 ──────────────────────────────
  // バックステップ（Shift+方向 / モバイルSTEPボタン）
  if ((pl.bstepCd || 0) > 0) pl.bstepCd--;
  if ((pl.bstepT  || 0) > 0) {
    pl.bstepT--;
    pl.vx = pl.bstepVx;
  } else {
    pl.vx = 0;
    if (K.ArrowLeft)  { pl.vx = -PSPD; pl.facing = -1; }
    if (K.ArrowRight) { pl.vx =  PSPD; pl.facing =  1; }
    if ((K.ShiftLeft || K.ShiftRight || K.KeyStep) && (pl.bstepCd || 0) <= 0) {
      let bdir = 0;
      if (K.KeyStep)       bdir = -pl.facing;          // モバイル: 後方ステップ
      else if (K.ArrowLeft)  bdir = -1;
      else if (K.ArrowRight) bdir =  1;
      if (bdir !== 0) { pl.bstepT = 10; pl.bstepCd = 30; pl.bstepVx = bdir * 7.5; }
    }
  }
  // 2段ジャンプ
  const jumpKeyNow = !!(K.ArrowUp || K.KeyX);
  if (jumpKeyNow && !pl.jumpKeyPrev && pl.jumpsLeft > 0) { pl.vy = JV; pl.jumpsLeft--; }
  pl.jumpKeyPrev = jumpKeyNow;
  // 攻撃
  if ((K.KeyZ || K.Space) && !pl.atk && (pl.atkCd || 0) <= 0) startPlWeaponAction();
  // 武器切り替え（1=ムチ 2=短剣 3=投げ斧）
  if (K.Digit1) pl.weapon = 'whip';
  if (K.Digit2) pl.weapon = 'dagger';
  if (K.Digit3) pl.weapon = 'throw_axe';

  if (pl.atk) { if (--pl.atkT <= 0) pl.atk = false; }
  if ((pl.atkCd || 0) > 0) pl.atkCd--;
  if (pl.inv) { if (--pl.invT <= 0) pl.inv = false; }
  if (pl.vx !== 0) { if (++pl.wt > 8) { pl.wf ^= 1; pl.wt = 0; } }

  pl.vy += G;
  pl.x = Math.max(0, Math.min(W - pl.w, pl.x + pl.vx));
  pl.y += pl.vy;
  if (pl.y > H + 60) pl.hp = 0;
  landOn(pl);
  if (pl.ground) pl.jumpsLeft = 2;

  // ─── 敵の更新 ────────────────────────────────────
  refillEnemyBuckets();

  // ゾンビAI：プレイヤーに向かって歩く
  Eb.z.forEach(z => {
    z.ht = Math.max(0, z.ht - 1);
    const dir = (pl.x + pl.w/2) > (z.x + z.w/2) ? 1 : -1;
    z.vx = dir * 0.7;
    z.vy += G;
    z.x += z.vx;
    z.y += z.vy;
    z.x = Math.max(0, Math.min(W - z.w, z.x));
    landOn(z);

    if (!pl.inv && overlaps(pl, z)) {
      pl.hp--;
      pl.inv  = true;
      pl.invT = INVDUR;
      pl.vy   = -6;
      pl.vx   = -pl.facing * 4; // のけぞり
    }
  });

  // コウモリAI：サイン波で飛行
  Eb.b.forEach(b => {
    b.ht = Math.max(0, b.ht - 1);
    b.ti += 0.046;
    b.x = b.ox + Math.cos(b.ti * 0.62) * 90;
    b.y = b.oy + Math.sin(b.ti) * 46;

    if (!pl.inv && overlaps(pl, b)) {
      pl.hp--;
      pl.inv  = true;
      pl.invT = INVDUR;
      pl.vy   = -4;
    }
  });

  // スケルトンAI（ゾンビと同型）
  Eb.s.forEach(sk => {
    sk.ht = Math.max(0, sk.ht - 1);
    const dir = (pl.x + pl.w/2) > (sk.x + sk.w/2) ? 1 : -1;
    sk.vx = dir * 0.78;
    sk.vy += G;
    sk.x += sk.vx;
    sk.y += sk.vy;
    sk.x = Math.max(0, Math.min(W - sk.w, sk.x));
    landOn(sk);

    if (!pl.inv && overlaps(pl, sk)) {
      pl.hp--;
      pl.inv  = true;
      pl.invT = INVDUR;
      pl.vy   = -6;
      pl.vx   = -pl.facing * 4;
    }
  });

  // 幽霊AI（ゆっくり漂う）
  Eb.h.forEach(h => {
    h.ht = Math.max(0, h.ht - 1);
    h.ti += 0.032;
    h.x = h.ox + Math.cos(h.ti * 0.55) * 72;
    h.y = h.oy + Math.sin(h.ti * 0.9) * 42;

    if (!pl.inv && overlaps(pl, h)) {
      pl.hp--;
      pl.inv  = true;
      pl.invT = INVDUR;
      pl.vy   = -3;
    }
  });

  // メドジェ：漂い＋やや大きめ（幽霊より遅い）
  Eb.d.forEach(m => {
    m.ht = Math.max(0, m.ht - 1);
    m.ti += 0.022;
    m.x = m.ox + Math.cos(m.ti * 0.42) * 84;
    m.y = m.oy + Math.sin(m.ti * 0.72) * 36;
    if (!pl.inv && overlaps(pl, m)) {
      pl.hp--;
      pl.inv  = true;
      pl.invT = INVDUR;
      pl.vy   = -3;
    }
  });

  // けトッシー：俊足の地上追跡（3HP）
  Eb.T.forEach(dog => {
    dog.ht = Math.max(0, dog.ht - 1);
    const dir = (pl.x + pl.w/2) > (dog.x + dog.w/2) ? 1 : -1;
    dog.vx = dir * 0.92;
    dog.vy += G;
    dog.x += dog.vx;
    dog.y += dog.vy;
    dog.x = Math.max(0, Math.min(W - dog.w, dog.x));
    landOn(dog);
    if (!pl.inv && overlaps(pl, dog)) {
      pl.hp--;
      pl.inv  = true;
      pl.invT = INVDUR;
      pl.vy   = -6;
      pl.vx   = -pl.facing * 4;
    }
  });

  // ないと：重装歩兵（遅い・高HP）
  Eb.n.forEach(kn => {
    kn.ht = Math.max(0, kn.ht - 1);
    const dir = (pl.x + pl.w/2) > (kn.x + kn.w/2) ? 1 : -1;
    kn.vx = dir * 0.5;
    kn.vy += G;
    kn.x += kn.vx;
    kn.y += kn.vy;
    kn.x = Math.max(0, Math.min(W - kn.w, kn.x));
    landOn(kn);
    if (!pl.inv && overlaps(pl, kn)) {
      pl.hp--;
      pl.inv  = true;
      pl.invT = INVDUR;
      pl.vy   = -5;
      pl.vx   = -pl.facing * 5;
    }
  });

  // ヘビーもす：小柄だがバースト疾走
  Eb.H.forEach(r => {
    r.ht = Math.max(0, r.ht - 1);
    r.burstT = (r.burstT + 1) % 48;
    const dir = (pl.x + pl.w/2) > (r.x + r.w/2) ? 1 : -1;
    r.vx = dir * (r.burstT < 18 ? 1.32 : 0.22);
    r.vy += G;
    r.x += r.vx;
    r.y += r.vy;
    r.x = Math.max(0, Math.min(W - r.w, r.x));
    landOn(r);
    if (!pl.inv && overlaps(pl, r)) {
      pl.hp--;
      pl.inv  = true;
      pl.invT = INVDUR;
      pl.vy   = -4;
    }
  });

  // リバイアサン：大振りの飛蛇軌道
  Eb.L.forEach(lv => {
    lv.ht = Math.max(0, lv.ht - 1);
    lv.ti += 0.026;
    lv.x = lv.ox + Math.cos(lv.ti * 0.48) * 128;
    lv.y = lv.oy + Math.sin(lv.ti * 0.82) * 54;
    if (!pl.inv && overlaps(pl, lv)) {
      pl.hp--;
      pl.inv  = true;
      pl.invT = INVDUR;
      pl.vy   = -4;
    }
  });

  // カカシ：ゆっくり寄るだけ（踏み込みは鈍い）
  Eb.K.forEach(sc => {
    sc.ht = Math.max(0, sc.ht - 1);
    const dir = (pl.x + pl.w/2) > (sc.x + sc.w/2) ? 1 : -1;
    sc.vx = dir * 0.34;
    sc.vy += G;
    sc.x += sc.vx;
    sc.y += sc.vy;
    sc.x = Math.max(0, Math.min(W - sc.w, sc.x));
    landOn(sc);
    if (!pl.inv && overlaps(pl, sc)) {
      pl.hp--;
      pl.inv  = true;
      pl.invT = INVDUR;
      pl.vy   = -4;
      pl.vx   = -pl.facing * 3;
    }
  });

  // 化け猫：素早く歩き＋間欠ジャンプ
  Eb.B.forEach(cat => {
    cat.ht = Math.max(0, cat.ht - 1);
    const dir = (pl.x + pl.w/2) > (cat.x + cat.w/2) ? 1 : -1;
    cat.vx = dir * 1.02;
    cat.vy += G;
    if (cat.ground) {
      cat.hopT++;
      if (cat.hopT > 78) { cat.vy = -8.2; cat.hopT = 0; }
    }
    cat.x += cat.vx;
    cat.y += cat.vy;
    cat.x = Math.max(0, Math.min(W - cat.w, cat.x));
    landOn(cat);
    if (!pl.inv && overlaps(pl, cat)) {
      pl.hp--;
      pl.inv  = true;
      pl.invT = INVDUR;
      pl.vy   = -5;
    }
  });

  // ボスAI（飛行は kind で速度・振幅・位相係数を変える）
  Eb.boss.forEach(bo => {
    bo.ht = Math.max(0, bo.ht - 1);
    if (bo.mode === 'fly') {
      let spd = 0.042, ax = 110, ay = 50, fcx = 0.62, fcy = 1;
      if (bo.kind === 'giant_bat') {
        spd = Math.max(0.022, 0.042 * Math.sqrt(108 / Math.max(bo.w, 72)));
        const margin = 8;
        const maxAx = Math.max(24, Math.min(bo.ox - margin, W - bo.ox - bo.w - margin));
        ax = Math.min(130, ~~(maxAx * 0.92));
        const roomY = Math.max(24, H - bo.oy - bo.h - 20);
        ay = Math.min(90, Math.max(32, roomY * 0.42));
        fcx = 0.62;
        fcy = 1;
      } else if (bo.kind === 'tengu') {
        spd = 0.05;
        ax = 128;
        ay = 44;
        fcx = 0.82;
        fcy = 0.88;
      } else if (bo.kind === 'yuki_onna') {
        spd = 0.03;
        ax = 88;
        ay = 58;
        fcx = 0.48;
        fcy = 1.12;
      }
      bo.ti += spd;
      bo.x = bo.ox + Math.cos(bo.ti * fcx) * ax;
      bo.y = bo.oy + Math.sin(bo.ti * fcy) * ay;
    } else {
      if (bo.kind === 'golem') {
        bo.golemPhaseT = (bo.golemPhaseT || 0) + 1;
        const T = bo.golemPhaseT;
        const DETACH_START = 280;
        const MERGE_START = 400;
        const MERGE_END = 520;

        const getGolemPartAnchors = () => {
          const cxm = bo.x + bo.w / 2;
          const cym = bo.y + bo.h * 0.22;
          return {
            head: { x: cxm - 28, y: cym - 20 },
            left: { x: bo.x - 18, y: bo.y + bo.h * 0.3 },
            right: { x: bo.x + bo.w - 22, y: bo.y + bo.h * 0.3 },
          };
        };

        if (!bo.detached && T >= DETACH_START) {
          bo.detached = true;
          const a = getGolemPartAnchors();
          bo.partHead = { x: a.head.x, y: a.head.y, w: 56, h: 46, vx: -0.45, vy: -1.6, ti: 0 };
          bo.partL = { x: a.left.x, y: a.left.y, w: 38, h: 40, vx: -1.4, vy: -0.6, ti: 1.2 };
          bo.partR = { x: a.right.x, y: a.right.y, w: 38, h: 40, vx: 1.4, vy: -0.6, ti: 2.4 };
        }

        if (bo.detached && bo.partHead && T < MERGE_START) {
          const bx = bo.x + bo.w / 2;
          const by = bo.y + bo.h * 0.42;
          const drift = ph => {
            const mx = ph.x + ph.w / 2 - bx;
            const my = ph.y + ph.h / 2 - by;
            const len = Math.hypot(mx, my) + 1e-6;
            ph.vx += (mx / len) * 0.055;
            ph.vy += (my / len) * 0.055;
            ph.vx += Math.sin(__frameTimeMs / 98 + ph.ti) * 0.048;
            ph.vy += Math.cos(__frameTimeMs / 120 + ph.ti * 1.08) * 0.042;
            ph.vx *= 0.991;
            ph.vy *= 0.991;
            ph.x += ph.vx;
            ph.y += ph.vy;
            ph.x = Math.max(-32, Math.min(W - ph.w + 32, ph.x));
            ph.y = Math.max(8, Math.min(H - ph.h - 44, ph.y));
            ph.ti += 0.03;
          };
          drift(bo.partHead);
          drift(bo.partL);
          drift(bo.partR);
        }

        if (bo.detached && bo.partHead && T >= MERGE_START) {
          const anchors = getGolemPartAnchors();
          const prog = Math.min(1, (T - MERGE_START) / (MERGE_END - MERGE_START));
          const pull = 0.065 + prog * 0.2;
          const pullPart = (ph, ax, ay) => {
            ph.x += (ax - ph.x) * pull;
            ph.y += (ay - ph.y) * pull;
            ph.vx *= 0.8;
            ph.vy *= 0.8;
          };
          pullPart(bo.partHead, anchors.head.x, anchors.head.y);
          pullPart(bo.partL, anchors.left.x, anchors.left.y);
          pullPart(bo.partR, anchors.right.x, anchors.right.y);
          const d0 = Math.hypot(bo.partHead.x - anchors.head.x, bo.partHead.y - anchors.head.y);
          const d1 = Math.hypot(bo.partL.x - anchors.left.x, bo.partL.y - anchors.left.y);
          const d2 = Math.hypot(bo.partR.x - anchors.right.x, bo.partR.y - anchors.right.y);
          if (T >= MERGE_END || (d0 < 5 && d1 < 5 && d2 < 5)) {
            bo.detached = false;
            bo.partHead = null;
            bo.partL = null;
            bo.partR = null;
            bo.golemPhaseT = 0;
          }
        }

        const dir = (pl.x + pl.w / 2) > (bo.x + bo.w / 2) ? 1 : -1;
        const spd = bo.detached ? 0.46 : 0.82;
        bo.vx = dir * spd;
        bo.vy += G;
        bo.x += bo.vx;
        bo.y += bo.vy;
        bo.x = Math.max(0, Math.min(W - bo.w, bo.x));
        landOn(bo);
      } else {
        const dir = (pl.x + pl.w/2) > (bo.x + bo.w/2) ? 1 : -1;
        let spd = 0.95;
        if (bo.kind === 'grave_wight') spd = 0.82;
        else if (bo.kind === 'kappa') spd = 1.02;
        else if (bo.kind === 'oni') spd = 1.18;
        else if (bo.kind === 'night_lord') spd = 1.06;
        bo.vx = dir * spd;
        bo.vy += G;
        bo.x += bo.vx;
        bo.y += bo.vy;
        bo.x = Math.max(0, Math.min(W - bo.w, bo.x));
        landOn(bo);
      }
    }
    if (!pl.inv && playerOverlapsEnemy(pl, bo)) {
      pl.hp--;
      pl.inv  = true;
      pl.invT = INVDUR;
      pl.vy   = -5;
      if (bo.mode === 'walk') pl.vx = -pl.facing * 4;
    }
  });

  // ─── 近接武器当たり判定（ムチ・短剣・ソード・斧） ──────────────────────────────
  const meleeBox = getPlayerMeleeHitbox();
  if (meleeBox) applyMeleeHitboxToWorld(meleeBox);

  tickProjs();
  tickPickups();

  // ─── パーティクル更新（in-place で filter の割り当て回避） ───
  let wi = 0;
  for (let i = 0; i < ptcls.length; i++) {
    const p = ptcls[i];
    if (p.life <= 0) continue;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.13;
    p.life--;
    if (p.life > 0) ptcls[wi++] = p;
  }
  ptcls.length = wi;

  // ─── 雑魚全滅後にボス出現 ─────────────────────────
  if (stageBossDef && !bossSpawned && enemies.every(e => !e.alive)) {
    enemies.push(mkBossFromDef(stageBossDef));
    bossSpawned = true;
    stageBossDef = null;
    syncBgmToGame();
  }

  // ─── 終了判定 ─────────────────────────────────────
  if (pl.hp <= 0) {
    gs = 'gameover';
    waitKey('Enter').then(initGame);
  }
  if (enemies.every(e => !e.alive)) {
    gs = 'clear';
    waitKey('Enter').then(onStageCleared);
  }
}

function onStageCleared() {
  if (STAGES_DATA && STAGES_DATA.stages && STAGES_DATA.stages.length)
    stageIndex = (stageIndex + 1) % STAGES_DATA.stages.length;
  initGame();
}

let __frameTimeMs = 0;
let __perfLastT = 0;
let __fpsEma = 60;
function refreshFrameTime() {
  const t = (typeof performance !== 'undefined' && performance.now)
    ? performance.now()
    : Date.now();
  if (__perfLastT > 0) {
    const dt = t - __perfLastT;
    // バックグラウンド復帰などの異常に長いフレームは FPS 推定から除外
    const instFps = 1000 / Math.max(8, Math.min(dt, 200));
    __fpsEma = __fpsEma * 0.9 + instFps * 0.1;
  }
  __perfLastT = t;
  __frameTimeMs = t;
}
const NOW = () => __frameTimeMs;

/** タイトル用：蝋燭の炎だけ簡易描画（本編の drawCandle とトーンを合わせる） */
function drawOpeningCandle(px, py) {
  const fl = Math.sin(NOW() / 80 + px * 0.02) * 2;
  cx.fillStyle = COL.candle;
  cx.fillRect(px - 4, py - 4, 8, 4);
  cx.fillRect(px - 2, py - 15, 4, 12);
  cx.fillStyle = COL.flame1;
  cx.beginPath();
  cx.ellipse(px, py - 19 + fl * 0.3, 4, 5 + fl, 0, 0, Math.PI * 2);
  cx.fill();
  cx.fillStyle = COL.flame2;
  cx.beginPath();
  cx.ellipse(px, py - 19 + fl * 0.3, 2, 3 + fl * 0.5, 0, 0, Math.PI * 2);
  cx.fill();
}

/** タイトル用：武器アイコンを描画（whip / dagger / throw_axe） */
function drawTitleWeaponIcon(px, py, kind, t) {
  const bob = Math.sin(t / 500 + (kind === 'whip' ? 0 : kind === 'dagger' ? 2.1 : 4.2)) * 3;
  const ix = ~~px, iy = ~~(py + bob);

  if (kind === 'whip') {
    cx.save();
    cx.translate(ix, iy);
    cx.strokeStyle = '#a06030'; cx.lineWidth = 3; cx.lineCap = 'round';
    cx.beginPath(); cx.moveTo(-20, -2); cx.quadraticCurveTo(0, 12, 22, 0); cx.stroke();
    cx.fillStyle = '#ff7030'; cx.fillRect(19, -4, 7, 7);
    cx.fillStyle = '#7a4820'; cx.fillRect(-27, -6, 9, 12);
    cx.restore();
    cx.fillStyle = '#c8a078'; cx.font = '9px monospace'; cx.textAlign = 'center';
    cx.fillText('ムチ', ix, iy + 20);

  } else if (kind === 'dagger') {
    cx.save();
    cx.translate(ix, iy);
    cx.fillStyle = '#c0ccd8';
    cx.beginPath(); cx.moveTo(0, -22); cx.lineTo(-5, 3); cx.lineTo(5, 3); cx.closePath(); cx.fill();
    cx.fillStyle = 'rgba(200,230,255,0.6)';
    cx.beginPath(); cx.moveTo(0, -22); cx.lineTo(-1.5, -8); cx.lineTo(2, 3); cx.closePath(); cx.fill();
    cx.fillStyle = '#8090a0'; cx.fillRect(-10, 3, 20, 5);
    cx.fillStyle = '#4a2810'; cx.fillRect(-3.5, 8, 7, 12);
    cx.restore();
    cx.fillStyle = '#c8a078'; cx.font = '9px monospace'; cx.textAlign = 'center';
    cx.fillText('短剣', ix, iy + 28);

  } else {
    // 投げ斧（スピン）
    cx.save();
    cx.translate(ix, iy);
    cx.rotate(t * 0.0035);
    cx.fillStyle = '#5c3820'; cx.fillRect(-2.5, -12, 5, 24);
    cx.fillStyle = '#6888a0';
    cx.beginPath(); cx.moveTo(0,-12); cx.lineTo(16,-18); cx.lineTo(18,-5); cx.lineTo(0,-2); cx.closePath(); cx.fill();
    cx.fillStyle = '#506070';
    cx.beginPath(); cx.moveTo(0,-12); cx.lineTo(-10,-16); cx.lineTo(-10,-5); cx.lineTo(0,-2); cx.closePath(); cx.fill();
    cx.strokeStyle = '#90b8c8'; cx.lineWidth = 1.5;
    cx.beginPath(); cx.moveTo(2,-12); cx.lineTo(15,-16); cx.stroke();
    cx.restore();
    cx.fillStyle = '#c8a078'; cx.font = '9px monospace'; cx.textAlign = 'center';
    cx.fillText('投げ斧', ix, iy + 30);
  }
}

/** オープニング画面（gs === 'title' 専用・全画面） */

  const ctrl = document.getElementById('ctrl');
  if (ctrl) ctrl.style.visibility = 'hidden';
  const t = NOW();

  // 背景グラデーション（より暗く）
  const g = cx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#040008');
  g.addColorStop(0.45, '#0c0414');
  g.addColorStop(1, '#1a0408');

  cx.fillRect(0, 0, W, H);

  // 月（右上）
  const moonX = W * 0.74, moonY = H * 0.2;

  // 左タワー
  cx.fillStyle = '#080214';

  cx.fillRect(22, 10, 12, 18); cx.fillRect(44, 6, 12, 18); cx.fillRect(64, 10, 12, 18);
  cx.fillStyle = 'rgba(255,190,60,0.7)'; cx.fillRect(46, 30, 12, 16);

  // 右タワー

  cx.fillRect(W - 74, 10, 48, 70);
  cx.fillRect(W - 82, 6, 12, 20); cx.fillRect(W - 64, 2, 14, 20); cx.fillRect(W - 44, 6, 12, 20);
  cx.fillStyle = 'rgba(255,190,60,0.7)'; cx.fillRect(W - 66, 26, 12, 16);
  cx.fillStyle = '#040010'; cx.fillRect(W - 64, 26, 3, 10);

  // 城壁

    const bh = 28 + ((bx * 7) % 17);

  // 浮遊する火の粉
  for (let i = 0; i < 24; i++) {

    cx.globalAlpha = Math.min(1, phase / 55) * (0.18 + (i % 4) * 0.1);

  // 稲妻（不定期）
  const lphase = (t * 0.00048) % 1;

  const hue = 0.5 + 0.5 * Math.sin(t / 1100);
  cx.fillStyle = `rgb(255,${Math.round(28 + hue * 62)},16)`;

  // サブタイトル・あらすじ

  cx.fillText('古城に漂う闇を、ムチと跳躍で切り裂け。', W / 2, H / 2 + 0);
  cx.fillText('燭台の火を守りながら、最深部を目指す。', W / 2, H / 2 + 16);

  // 武器ショーケース
  cx.fillStyle = 'rgba(255,200,100,0.12)';
  cx.fillRect(W / 2 - 118, H / 2 + 30, 236, 48);
  cx.strokeStyle = 'rgba(255,180,60,0.28)'; cx.lineWidth = 1;
  cx.strokeRect(W / 2 - 118, H / 2 + 30, 236, 48);
  drawTitleWeaponIcon(W / 2 - 78, H / 2 + 54, 'whip', t);
  drawTitleWeaponIcon(W / 2,      H / 2 + 54, 'dagger', t);
  drawTitleWeaponIcon(W / 2 + 78, H / 2 + 54, 'throw_axe', t);

  // スタート
  const pulse = 0.35 + 0.65 * (0.5 + 0.5 * Math.sin(t / 420));
  cx.globalAlpha = pulse;
  cx.fillStyle = '#ffd8a0'; cx.font = 'bold 15px monospace';
  const sub = isMobileUa ? 'Enter ／ 画面タップではじめる' : 'Enter キーではじめる';
  cx.fillText('▼  ' + sub + '  ▼', W / 2, H / 2 + 96);
  cx.globalAlpha = 1;
  cx.textAlign = 'left';
}

/** ステージクリア時のエンディング風オーバーレイ */
function drawEndingScreen(subNext) {
  cx.fillStyle = 'rgba(4, 0, 10, 0.78)';
  cx.fillRect(0, 0, W, H);

  const t = NOW();
  const rg = cx.createRadialGradient(W / 2, H * 0.28, 8, W / 2, H * 0.42, H * 0.95);
  rg.addColorStop(0, 'rgba(255, 220, 140, 0.35)');
  rg.addColorStop(0.35, 'rgba(180, 120, 40, 0.12)');
  rg.addColorStop(1, 'rgba(0, 0, 0, 0)');
  cx.fillStyle = rg;
  cx.fillRect(0, 0, W, H);

  // 舞い上がる光の粒
  for (let i = 0; i < 36; i++) {
    const phase = (t * 0.035 + i * 1.7) % (H + 40);
    const x = (i * 97 + t * 0.08) % (W + 20) - 10;
    const y = H - phase;
    const a = 0.15 + (i % 5) * 0.08;
    cx.globalAlpha = Math.min(1, phase / 120) * a;
    cx.fillStyle = i % 3 === 0 ? '#fff8e0' : '#ffd080';
    cx.fillRect(~~x, ~~y, 2, 2);
  }
  cx.globalAlpha = 1;

  cx.textAlign = 'center';
  cx.fillStyle = 'rgba(60, 30, 0, 0.45)';
  cx.font = 'bold 36px monospace';
  cx.fillText('✝ STAGE CLEAR ✝', W / 2 + 2, H / 2 - 36 + 2);
  cx.fillStyle = '#ffee88';
  cx.font = 'bold 36px monospace';
  cx.fillText('✝ STAGE CLEAR ✝', W / 2, H / 2 - 36);
  cx.fillStyle = '#d0b090';
  cx.font = '13px monospace';
  cx.fillText('この回廊から、ひとすじの光が戻った。', W / 2, H / 2 - 2);
  cx.fillStyle = '#907868';
  cx.font = '11px monospace';
  cx.fillText('あなたの燭台は、まだ揺れている——次の深淵へ。', W / 2, H / 2 + 16);

  const pulse = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t / 380));
  cx.globalAlpha = pulse;
  cx.fillStyle = '#ffe8c8';
  cx.font = 'bold 14px monospace';
  cx.fillText(subNext, W / 2, H / 2 + 58);
  cx.globalAlpha = 1;
  cx.textAlign = 'left';
}

function draw() {
  if (gs === 'title') {
    drawOpeningScreen();
    syncBgmToGame();
    return;
  }

  drawCachedBgPattern();
  PLATS.forEach(drawPlat);
  for (let ci = 0; ci < candles.length; ci++) {
    const c = candles[ci];
    if (c.a) drawCandle(c);
  }

  __aliveDrawScratch.length = 0;
  for (let ei = 0; ei < enemies.length; ei++) {
    const e = enemies[ei];
    if (e.alive) __aliveDrawScratch.push(e);
  }
  __aliveDrawScratch.sort((a, b) => a.y - b.y);
  for (let di = 0; di < __aliveDrawScratch.length; di++) {
    const e = __aliveDrawScratch[di];
    if (e.t === 'z') drawZombie(e);
    else if (e.t === 'b') drawBat(e);
    else if (e.t === 's') drawSkeleton(e);
    else if (e.t === 'h') drawGhost(e);
    else if (e.t === 'd') drawMedoje(e);
    else if (e.t === 'T') drawKetossi(e);
    else if (e.t === 'n') drawKnightMob(e);
    else if (e.t === 'H') drawHeavyMosu(e);
    else if (e.t === 'L') drawLeviathan(e);
    else if (e.t === 'K') drawKakashi(e);
    else if (e.t === 'B') drawBakeneko(e);
    else if (e.t === 'boss') drawBoss(e);
  }

  drawPlayer();
  drawProjs();
  drawPickups();

  ptcls.forEach(p => {
    cx.globalAlpha = p.life / 36;
    cx.fillStyle = p.col;
    cx.fillRect(~~p.x - 2, ~~p.y - 2, 4, 4);
  });
  cx.globalAlpha = 1;

  drawHUD();

  const subGo   = isMobileUa ? 'Enter ／ タップでリスタート' : 'Enter キーでリスタート';
  const subNext = isMobileUa ? 'Enter ／ タップで次の面へ' : 'Enter で次の面へ';
  if (gs === 'gameover') drawScreen('GAME OVER', '#cc0000', subGo);
  if (gs === 'clear') drawEndingScreen(subNext);

  syncBgmToGame();
}

// ─── プラットフォーム ─────────────────────────────────
function drawPlat(p) {
  const P = getBgPalette();
  const isFloor = p.h > 16;
  cx.fillStyle = isFloor ? P.floor : P.plat;
  cx.fillRect(p.x, p.y, p.w, p.h);
  cx.fillStyle = P.floorHi;
  cx.fillRect(p.x, p.y, p.w, 4);
  if (isFloor) {
    cx.fillStyle = '#2a0e00';
    for (let bx = p.x + 32; bx < p.x + p.w; bx += 32)
      cx.fillRect(bx, p.y + 6, 2, p.h - 6);
  }
}

function drawCandle(c) {
  const fl = Math.sin(NOW() / 80 + c.x) * 2;
  cx.fillStyle = COL.candle;
  cx.fillRect(c.x-4, c.y-4, 8, 4);
  cx.fillRect(c.x-2, c.y-15, 4, 12);
  cx.fillStyle = COL.flame1;
  cx.beginPath();
  cx.ellipse(c.x, c.y-19+fl*.3, 4, 5+fl, 0, 0, Math.PI*2);

  cx.fillStyle = COL.flame2;
  cx.beginPath();
  cx.ellipse(c.x, c.y-19+fl*.3, 2, 3+fl*.5, 0, 0, Math.PI*2);

}

/** 3面ボス：晶塊ゴーレム — 派手なグラデ＋分離パーツ */
function drawBossGolem(b) {
  const x = ~~b.x, y = ~~b.y;
  const w = b.w, h = b.h;
  const pulse = 0.65 + 0.35 * Math.sin(NOW() / 160);
  const t = NOW() / 70;

  function drawCrystal(px, py, pw, ph, hueShift) {
    const g = cx.createLinearGradient(px, py, px + pw, py + ph);
    g.addColorStop(0, `hsla(${280 + hueShift}, 90%, 72%, ${pulse})`);
    g.addColorStop(0.45, `hsla(${200 + hueShift}, 85%, 55%, ${pulse})`);
    g.addColorStop(1, `hsla(${320 + hueShift}, 70%, 40%, ${pulse})`);
    cx.fillStyle = g;
    cx.beginPath();
    cx.moveTo(px + pw / 2, py);
    cx.lineTo(px + pw, py + ph * 0.42);
    cx.lineTo(px + pw * 0.78, py + ph);
    cx.lineTo(px + pw * 0.22, py + ph);
    cx.lineTo(px, py + ph * 0.42);
    cx.closePath();
    cx.fill();
    cx.strokeStyle = 'rgba(255,255,255,0.35)';
    cx.lineWidth = 1;
    cx.stroke();
  }

  if (!b.detached || !b.partHead) {
    const bodyG = cx.createLinearGradient(x, y, x + w, y + h);
    bodyG.addColorStop(0, '#2a2050');
    bodyG.addColorStop(0.35, '#4a3088');
    bodyG.addColorStop(0.65, '#206878');
    bodyG.addColorStop(1, '#1a4038');
    cx.fillStyle = bodyG;
    cx.fillRect(x + 6, y + h * 0.28, w - 12, h * 0.72);
    cx.fillStyle = '#503070';
    cx.fillRect(x + w * 0.12, y + h * 0.5, w * 0.76, h * 0.38);
    drawCrystal(x + w * 0.08, y + h * 0.05, w * 0.22, h * 0.35, 0);
    drawCrystal(x + w * 0.38, y - h * 0.02, w * 0.26, h * 0.4, 25);
    drawCrystal(x + w * 0.72, y + h * 0.08, w * 0.2, h * 0.32, -15);
    cx.fillStyle = '#ffaa20';
    cx.shadowColor = '#ff6600';
    cx.shadowBlur = isMobileUa ? 0 : 10;
    cx.fillRect(x + w * 0.38, y + h * 0.2, 8, 10);
    cx.fillRect(x + w * 0.52, y + h * 0.2, 8, 10);
    cx.shadowBlur = 0;
    cx.fillStyle = '#ffd080';
    cx.fillRect(x + w * 0.28, y + h * 0.12, w * 0.44, h * 0.22);
    cx.fillStyle = '#201828';
    cx.fillRect(x + w * 0.36, y + h * 0.18, 6, 7);
    cx.fillRect(x + w * 0.54, y + h * 0.18, 6, 7);
    cx.fillStyle = '#604050';
    cx.fillRect(x - 4, y + h * 0.38, w * 0.22, h * 0.28);
    cx.fillRect(x + w - w * 0.18, y + h * 0.38, w * 0.22, h * 0.28);
    cx.strokeStyle = 'rgba(255,200,120,0.4)';
    cx.strokeRect(x + 4, y + 4, w - 8, h - 8);
    return;
  }

  const tw = w * 0.52;
  const tx = x + (w - tw) / 2;
  const ty = y + h * 0.4;
  const th = h * 0.58;
  const legG = cx.createLinearGradient(tx, ty, tx + tw, ty + th);
  legG.addColorStop(0, '#352060');
  legG.addColorStop(1, '#0a5060');
  cx.fillStyle = legG;
  cx.fillRect(~~tx, ~~ty, ~~tw, ~~th);
  for (let i = 0; i < 5; i++) {
    drawCrystal(tx + i * tw * 0.18, ty + th * 0.15, tw * 0.2, th * 0.55, i * 18);
  }

  function drawFloater(ph, hue0) {
    const px = ~~ph.x, py = ~~ph.y, pw = ~~ph.w, phh = ~~ph.h;
    const g = cx.createRadialGradient(px + pw / 2, py + phh / 2, 2, px + pw / 2, py + phh / 2, Math.max(pw, phh) * 0.9);
    g.addColorStop(0, `hsla(${hue0}, 100%, 70%, 0.95)`);
    g.addColorStop(0.55, `hsla(${hue0 + 40}, 85%, 50%, 0.85)`);
    g.addColorStop(1, `hsla(${hue0 + 80}, 70%, 35%, 0.55)`);
    cx.fillStyle = g;
    cx.beginPath();
    cx.ellipse(px + pw / 2, py + phh / 2, pw / 2 + 4, phh / 2 + 4, Math.sin(t + ph.ti) * 0.12, 0, Math.PI * 2);
    cx.fill();
    cx.fillStyle = '#fff8e0';
    cx.globalAlpha = 0.35;
    cx.fillRect(px + pw * 0.25, py + phh * 0.2, pw * 0.5, phh * 0.25);
    cx.globalAlpha = 1;
    cx.fillStyle = '#ff5020';
    cx.fillRect(px + pw * 0.32, py + phh * 0.42, 7, 8);
    cx.fillRect(px + pw * 0.55, py + phh * 0.42, 7, 8);
  }

  drawFloater(b.partHead, 48);
  drawFloater(b.partL, 200);
  drawFloater(b.partR, 280);
}

/** 大コウモリ：ビットマップ（読み込み前は従来の矩形シルエット） */
function drawBossGiantBat(b) {
  const x = ~~b.x, y = ~~b.y;
  const im = IMG_GIANT_BAT;
  if (im.complete && im.naturalWidth > 0) {
    const iw = im.naturalWidth, ih = im.naturalHeight;
    const scale = Math.min(b.w / iw, b.h / ih);
    const dw = ~~(iw * scale), dh = ~~(ih * scale);
    const dx = x + ~~((b.w - dw) / 2);
    const dy = y + ~~((b.h - dh) / 2);
    cx.drawImage(im, dx, dy, dw, dh);
    return;
  }
  const flap = ~~(NOW() / 72) % 2;
  const wing = ~~(b.w * 0.48);
  cx.fillStyle = COL.batWing;
  if (flap) {
    cx.fillRect(x - wing, y + 2, Math.max(8, wing - 2), ~~(b.h * 0.5));
    cx.fillRect(x + b.w + 2, y + 2, Math.max(8, wing - 2), ~~(b.h * 0.5));
  } else {
    cx.fillRect(x - wing + 2, y - 4, Math.max(8, wing - 4), ~~(b.h * 0.7));
    cx.fillRect(x + b.w + 2, y - 4, Math.max(8, wing - 4), ~~(b.h * 0.7));
  }
  cx.fillStyle = bossAccentColor('giant_bat');
  cx.fillRect(x, y, b.w, b.h);
  cx.fillStyle = '#ff2040';
  cx.fillRect(x + ~~(b.w * 0.18), y + ~~(b.h * 0.28), 6, 6);
  cx.fillRect(x + ~~(b.w * 0.62), y + ~~(b.h * 0.28), 6, 6);
}

/** 天狗：羽扇風の翼＋赤面・長鼻シルエット */
function drawBossTengu(b) {
  const x = ~~b.x, y = ~~b.y;
  const t = NOW() / 90;
  const fan = ~~(Math.sin(t) * 4 + 4);
  cx.fillStyle = '#4a3820';
  cx.fillRect(x - 10 - fan, y + 4, 14 + fan, b.h - 8);
  cx.fillRect(x + b.w - 4 + fan, y + 4, 14 + fan, b.h - 8);
  cx.fillStyle = '#5a4030';
  for (let i = 0; i < 5; i++) {
    cx.fillRect(x - 8 - fan + i * 2, y + 6 + i * 3, 3, 10 + i * 2);
    cx.fillRect(x + b.w + 5 + fan - i * 2, y + 6 + i * 3, 3, 10 + i * 2);
  }
  cx.fillStyle = '#6a4a9c';
  cx.fillRect(x + 4, y + 8, b.w - 8, b.h - 10);
  cx.fillStyle = '#c02020';
  cx.fillRect(x + ~~(b.w * 0.35), y + 4, ~~(b.w * 0.3), 14);
  cx.fillStyle = '#ffd0a0';
  cx.fillRect(x + ~~(b.w * 0.42), y + 18, 8, 16);
  cx.fillStyle = '#201010';
  cx.fillRect(x + ~~(b.w * 0.45), y + 22, 3, 8);
}

/** 雪女：翼なし・白い長衣＋袖の揺れ */
function drawBossYuki(b) {
  const x = ~~b.x, y = ~~b.y;
  const sway = Math.sin(NOW() / 140) * 4;
  cx.fillStyle = '#e8f4ff';
  cx.fillRect(x + 2, y + 6, b.w - 4, b.h - 6);
  cx.fillStyle = '#ffffff';
  cx.fillRect(x + 6, y + 2, b.w - 12, ~~(b.h * 0.45));
  cx.fillStyle = 'rgba(200,220,255,0.5)';
  cx.fillRect(x - 6 + sway, y + 10, 8, b.h - 16);
  cx.fillRect(x + b.w - 2 + sway, y + 10, 8, b.h - 16);
  cx.fillStyle = '#304060';
  cx.fillRect(x + ~~(b.w * 0.35), y + 10, 5, 5);
  cx.fillRect(x + ~~(b.w * 0.55), y + 10, 5, 5);
  cx.fillStyle = '#90b0d0';
  cx.fillRect(x + ~~(b.w * 0.25), y + ~~(b.h * 0.55), b.w - ~~(b.w * 0.5), 4);
}

/** 墓守ワイト：痩せた長躯・青白い頭 */
function drawBossWight(b) {
  const x = ~~b.x, y = ~~b.y;
  cx.fillStyle = '#2a3830';
  cx.fillRect(x + 6, y + 12, b.w - 12, b.h - 14);
  cx.fillStyle = '#5a7060';
  cx.fillRect(x + 8, y + 16, b.w - 16, b.h - 24);
  cx.fillStyle = '#8ab0a0';
  cx.fillRect(x + ~~(b.w * 0.28), y + 2, ~~(b.w * 0.44), ~~(b.h * 0.38));
  cx.fillStyle = '#204030';
  cx.fillRect(x + ~~(b.w * 0.35), y + 12, 5, 5);
  cx.fillRect(x + ~~(b.w * 0.55), y + 12, 5, 5);
  cx.fillStyle = '#1a2018';
  cx.fillRect(x + 4, y + ~~(b.h * 0.72), 6, ~~(b.h * 0.26));
  cx.fillRect(x + b.w - 10, y + ~~(b.h * 0.72), 6, ~~(b.h * 0.26));
}

/** 河童：皿頭・緑胴・甲羅 */
function drawBossKappa(b) {
  const x = ~~b.x, y = ~~b.y;
  cx.fillStyle = '#4a8a58';
  cx.fillRect(x + 4, y + 14, b.w - 8, b.h - 16);
  cx.fillStyle = '#2a6040';
  cx.fillRect(x + 6, y + ~~(b.h * 0.42), b.w - 12, ~~(b.h * 0.38));
  cx.fillStyle = '#6ab070';
  cx.fillRect(x + ~~(b.w * 0.2), y + 6, ~~(b.w * 0.6), 12);
  cx.fillStyle = '#c8d8e8';
  cx.fillRect(x + ~~(b.w * 0.28), y - 2, ~~(b.w * 0.44), 8);
  cx.fillStyle = '#203028';
  cx.fillRect(x + ~~(b.w * 0.38), y + 18, 5, 4);
  cx.fillRect(x + ~~(b.w * 0.55), y + 18, 5, 4);
}

/** 鬼：角・赤肌・広肩 */
function drawBossOni(b) {
  const x = ~~b.x, y = ~~b.y;
  cx.fillStyle = '#5a1010';
  cx.fillRect(x + 2, y + 10, b.w - 4, b.h - 12);
  cx.fillStyle = '#9a3030';
  cx.fillRect(x + 6, y + 14, b.w - 12, b.h - 20);
  cx.fillStyle = '#4a0808';
  cx.fillRect(x + ~~(b.w * 0.2), y + 2, 8, 12);
  cx.fillRect(x + b.w - 28, y + 2, 8, 12);
  cx.fillStyle = '#ffd0a0';
  cx.fillRect(x + ~~(b.w * 0.25), y + 8, b.w - ~~(b.w * 0.5), ~~(b.h * 0.35));
  cx.fillStyle = '#ffd000';
  cx.fillRect(x + ~~(b.w * 0.35), y + 16, 6, 4);
  cx.fillRect(x + ~~(b.w * 0.52), y + 16, 6, 4);
  cx.fillStyle = '#101010';
  cx.fillRect(x + ~~(b.w * 0.32), y + 18, 5, 5);
  cx.fillRect(x + ~~(b.w * 0.58), y + 18, 5, 5);
}

/** 古城の主：マント・王冠風・赤眼 */
function drawBossNightLord(b) {
  const x = ~~b.x, y = ~~b.y;
  cx.fillStyle = '#0a0418';
  cx.fillRect(x, y + 8, b.w, b.h - 6);
  cx.fillStyle = '#2a1850';
  cx.fillRect(x + 4, y + 16, b.w - 8, b.h - 22);
  cx.fillStyle = '#501878';
  cx.fillRect(x - 4, y + 20, 8, b.h - 28);
  cx.fillRect(x + b.w - 4, y + 20, 8, b.h - 28);
  cx.fillStyle = '#d0a020';
  cx.fillRect(x + ~~(b.w * 0.25), y + 2, b.w - ~~(b.w * 0.5), 10);
  cx.fillStyle = '#e8d0c8';
  cx.fillRect(x + ~~(b.w * 0.32), y + 12, ~~(b.w * 0.36), ~~(b.h * 0.28));
  cx.fillStyle = '#ff1020';
  cx.fillRect(x + ~~(b.w * 0.38), y + 18, 5, 5);
  cx.fillRect(x + ~~(b.w * 0.54), y + 18, 5, 5);
}

function drawBoss(b) {
  cx.globalAlpha = (b.ht > 0 && ~~(b.ht / 4) % 2) ? 0.3 : 1;
  const k = b.kind;
  if (b.mode === 'fly') {
    if (k === 'giant_bat') drawBossGiantBat(b);
    else if (k === 'tengu') drawBossTengu(b);
    else if (k === 'yuki_onna') drawBossYuki(b);
    else drawBossGiantBat(b);
  } else {
    if (k === 'grave_wight') drawBossWight(b);
    else if (k === 'kappa') drawBossKappa(b);
    else if (k === 'oni') drawBossOni(b);
    else if (k === 'night_lord') drawBossNightLord(b);
    else if (k === 'golem') drawBossGolem(b);
    else drawBossWight(b);
  }
  cx.globalAlpha = 1;
}

// ─── 弾・ドロップ描画 ─────────────────────────────────
function drawProjs() {
  for (let i = 0; i < projs.length; i++) {
    const p = projs[i];
    if (p.t === 'axe') {
      const spin = (78 - p.life) * (p.vx > 0 ? 0.24 : -0.24);
      cx.save();
      cx.translate(~~(p.x + p.w / 2), ~~(p.y + p.h / 2));
      cx.rotate(spin);
      // 柄
      cx.fillStyle = '#5c3820'; cx.fillRect(-2, -9, 4, 18);
      // メイン刃（右）
      cx.fillStyle = '#6888a0';
      cx.beginPath(); cx.moveTo(0,-9); cx.lineTo(13,-15); cx.lineTo(15,-4); cx.lineTo(0,-1); cx.closePath(); cx.fill();
      // 背刃（左）
      cx.fillStyle = '#506070';
      cx.beginPath(); cx.moveTo(0,-9); cx.lineTo(-9,-13); cx.lineTo(-9,-4); cx.lineTo(0,-1); cx.closePath(); cx.fill();
      // 刃の輝き
      cx.strokeStyle = '#90b8c8'; cx.lineWidth = 1.2;
      cx.beginPath(); cx.moveTo(1,-9); cx.lineTo(12,-14); cx.stroke();
      cx.restore();
    } else if (p.t === 'bomb') {
      const bx = ~~p.x;
      const by = ~~p.y;
      cx.fillStyle = '#1a1a1a';
      cx.fillRect(bx, by, p.w, p.h);
      cx.fillStyle = '#ff4400';
      cx.fillRect(bx + 3, by - 3, 3, 5);
    }
  }
}

function drawPickups() {
  for (let i = 0; i < pickups.length; i++) {
    const p = pickups[i];
    const bob = Math.sin((p.bob || 0) + NOW() / 120) * 2;
    const px = ~~p.x;
    const py = ~~(p.y + bob);
    if (p.t === 'coin') {
      cx.fillStyle = '#c9a020';
      cx.beginPath();
      cx.ellipse(px, py - 8, 7, 9, 0, 0, Math.PI * 2);
      cx.fill();
      cx.fillStyle = '#ffe8a0';
      cx.font = 'bold 9px monospace';
      cx.textAlign = 'center';
      cx.fillText(String(p.val), px, py - 5);
      cx.textAlign = 'left';
    } else if (p.t === 'weapon') {
      cx.fillStyle = '#6a5080';
      cx.fillRect(px - 8, py - 16, 16, 14);
      cx.fillStyle = '#e8d0ff';
      cx.font = '9px monospace';
      cx.textAlign = 'center';
      const lab = WEAPON_LABEL_JA[sanitizeWeaponId(p.kind)] || '?';
      cx.fillText(lab.length > 4 ? lab.slice(0, 4) : lab, px, py - 5);
      cx.textAlign = 'left';
    }
  }
}

// ─── プレイヤー ───────────────────────────────────────
function drawPlayer() {
  if (pl.inv && ~~(pl.invT/6)%2) return; // 無敵中点滅
  const x = ~~pl.x, y = ~~pl.y;
  const wid = sanitizeWeaponId(pl.weapon);

  // 攻撃エフェクト（武器別）
  if (pl.atk) {
    const dur = WEAPON_MELEE_DUR[wid] || WDUR;
    const prog = (dur - pl.atkT) / dur;
    const dir = pl.facing;

    if (wid === 'whip') {
      const ext   = Math.min(prog * 2, 1);
      const ret   = pl.atkT < dur * .5 ? pl.atkT / (dur * .5) : 1;
      const wlen  = WRANGE * ext * ret;
      const sx    = dir > 0 ? x + pl.w : x;
      const ex    = sx + dir * wlen;
      const mx    = (sx + ex) / 2;
      const curve = Math.sin(prog * Math.PI) * 18;
      cx.strokeStyle = COL.whip;
      cx.lineWidth   = 3;
      cx.lineCap     = 'round';
      cx.beginPath();
      cx.moveTo(sx, y + 10);
      cx.quadraticCurveTo(mx, y + 10 + curve, ex, y + 10 + Math.sin(prog*Math.PI*1.5)*5);
      cx.stroke();
      cx.fillStyle = COL.whipTip;
      cx.fillRect(ex - 3, y + 8, 6, 6);
    } else if (wid === 'dagger') {
      const reach = 8 + prog * 34;
      const handX = dir > 0 ? x + pl.w - 2 : x + 2;
      const tipX  = handX + dir * reach;
      const tipY  = y + 12 + prog * 4;
      cx.save();
      cx.translate(tipX, tipY);
      cx.scale(dir, 1);
      // 刃（先端から柄へ向かって広がるひし形）
      cx.fillStyle = '#c0ccd8';
      cx.beginPath();
      cx.moveTo(0, 0);
      cx.lineTo(-6, -3); cx.lineTo(-reach + 4, -2);
      cx.lineTo(-reach + 4, 2); cx.lineTo(-6, 3);
      cx.closePath(); cx.fill();
      // 輝き
      cx.fillStyle = 'rgba(210,235,255,0.6)';
      cx.beginPath();
      cx.moveTo(0, 0); cx.lineTo(-5, -2.5);
      cx.lineTo(-reach + 6, -1.5); cx.lineTo(-reach + 6, 0);
      cx.closePath(); cx.fill();
      if (reach > 10) {
        // ガード（鍔）
        cx.fillStyle = '#808898'; cx.fillRect(-reach + 1, -5, 5, 10);
        // 柄
        cx.fillStyle = '#3c2010'; cx.fillRect(-reach - 8, -3, 9, 6);
      }
      cx.restore();
    } else if (wid === 'sword') {
      const reach = 12 + prog * 52;
      const sx = dir > 0 ? x + pl.w - 4 : x - reach + 4;
      cx.strokeStyle = '#a8c8ff';
      cx.lineWidth = 4;
      cx.lineCap = 'round';
      cx.beginPath();
      cx.moveTo(sx, y + 8);
      cx.lineTo(sx + dir * reach, y + 14 - prog * 6);
      cx.stroke();
      cx.strokeStyle = '#e8f0ff';
      cx.lineWidth = 1;
      cx.beginPath();
      cx.moveTo(sx, y + 8);
      cx.lineTo(sx + dir * reach, y + 14 - prog * 6);
      cx.stroke();
    } else if (wid === 'axe') {
      const reachV = 10 + prog * 48;
      const wx = dir > 0 ? x + pl.w - 12 : x - reachV + 12;
      cx.fillStyle = '#604030';
      cx.fillRect(wx, y - 2, reachV, 10);
      cx.fillStyle = '#908070';
      const bw = 14;
      const bx = dir > 0 ? wx + reachV - bw : wx;
      cx.fillRect(bx, y - 10, bw, 18);
    }
  }

  cx.save();
  if (pl.facing < 0) {
    cx.translate(x + pl.w, 0);
    cx.scale(-1, 1);
    cx.translate(-x, 0);
  }

  // マント
  cx.fillStyle = COL.cape;
  cx.fillRect(x+1, y+14, 7, 22);

  // 胴体
  cx.fillStyle = COL.plDark;
  cx.fillRect(x+6, y+14, 10, 18);
  cx.fillStyle = COL.pl;
  cx.fillRect(x+7, y+15, 8, 16);

  // 頭
  cx.fillStyle = COL.skin;
  cx.fillRect(x+5, y+2, 12, 13);
  cx.fillStyle = COL.hair;
  cx.fillRect(x+5, y+2, 12, 5);
  cx.fillRect(x+5, y+2, 2, 8);
  // 目
  cx.fillStyle = '#000';
  cx.fillRect(x+8, y+8, 2, 3);
  cx.fillRect(x+13, y+8, 2, 3);

  // 腕
  cx.fillStyle = COL.plDark;
  cx.fillRect(x+15, pl.atk ? y+14 : y+16, 6, 5);

  // 足（歩行アニメ）
  const la = pl.ground ? (pl.wf ? 3 : 0) : 4;
  const lb = pl.ground ? (pl.wf ? 0 : 3) : 0;
  cx.fillStyle = '#2a1000';
  cx.fillRect(x+7, y+30+la, 5, 8);
  cx.fillRect(x+12, y+30+lb, 5, 8);

  cx.restore();
}

// ─── HUD ──────────────────────────────────────────────
function drawHUD() {
  if (!pl) return;
  syncWeaponBtn();
  const totalStages = STAGES_DATA && STAGES_DATA.stages ? STAGES_DATA.stages.length : 0;
  if (totalStages > 0 && gs === 'playing') {
    cx.fillStyle = '#8899aa';
    cx.font = '11px monospace';
    cx.textAlign = 'center';
    cx.fillText(`第 ${stageIndex + 1} / ${totalStages} 面`, W / 2, 16);
    cx.textAlign = 'left';
  }
  cx.fillStyle = COL.score;
  cx.font = 'bold 14px monospace';
  cx.fillText(`SCORE  ${String(score).padStart(6,'0')}`, 10, 20);
  cx.fillStyle = '#9a8a78';
  cx.font = '11px monospace';
  const wj = WEAPON_LABEL_JA[sanitizeWeaponId(pl.weapon)] || '';
  cx.fillText(`武器 ${wj}`, 10, 36);

  for (let i = 0; i < 5; i++) {
    cx.globalAlpha = i < pl.hp ? 1 : 0.18;
    cx.fillStyle = COL.hp;
    cx.font = '16px monospace';
    cx.fillText('♥', W - 28 - i*22, 20);
  }
  cx.globalAlpha = 1;

  let alive = 0;
  for (let ai = 0; ai < enemies.length; ai++) {
    if (enemies[ai].alive) alive++;
  }
  cx.fillStyle = '#888';
  cx.font = '11px monospace';
  const st = STAGES_DATA && STAGES_DATA.stages && STAGES_DATA.stages[stageIndex];
  const stageLabel = st && st.name ? `${st.name} · ` : '';
  cx.fillText(`${stageLabel}残り敵: ${alive} / ${enemies.length}`, 10, H - 8);
  if (__gameShowHudPerf) {
    cx.fillStyle = '#6a9a6a';
    cx.font = '10px monospace';
    cx.textAlign = 'right';
    cx.fillText(`FPS ~${__fpsEma.toFixed(0)}`, W - 6, 52);
    cx.textAlign = 'left';
  }
}

// ─── 画面オーバーレイ ─────────────────────────────────
function drawScreen(title, col, sub) {
  cx.fillStyle = 'rgba(0,0,0,0.72)';
  cx.fillRect(0, 0, W, H);
  cx.textAlign = 'center';
  cx.fillStyle = col;
  cx.font = 'bold 34px monospace';
  cx.fillText(title, W/2, H/2 - 22);
  cx.fillStyle = '#ddd';
  cx.font = '15px monospace';
  cx.fillText(sub, W/2, H/2 + 20);
  cx.textAlign = 'left';
}

// ═══════════════════════════════════════════════════════
//  タイトル画面・メインループ
// ═══════════════════════════════════════════════════════

// タイトル表示用ダミー状態
pl = { hp: 5, inv: false };
enemies = []; candles = []; ptcls = []; score = 0; pickups = []; projs = [];

loadStagesJson();

initVirtualControls();
syncVirtualControlsFromGs();
window.addEventListener('resize', () => { window.scrollTo(0, 0); }, { passive: true });

// Enter／タップでゲーム開始
waitKey('Enter').then(() => initGame());

// iOS 向け: パーティクル数上限・モバイル時 burst 削減・desynchronized Canvas・performance.now クロック（FPS は ?perf=1 で表示）
(function loop() {
  refreshFrameTime();
  update();
  draw();
  requestAnimationFrame(loop);
})();
</script>
